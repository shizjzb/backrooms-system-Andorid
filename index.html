}

async function callDS(userMsg, searchContext) {
  const t = getActive();
  let enrichedMsg = searchContext
    ? `[联网参考资料（仅供叙事参考）]\n${searchContext}\n\n[玩家行动]\n${userMsg}`
    : userMsg;

  t.convoHistory.push({ role:"user", content: enrichedMsg });

  // ── 智能上下文压缩 ──
  // 当对话历史超过24条时，把早期对话压缩成一条摘要
  // 这样token消耗不会随游戏时长无限增长
  let msgs;
  if (t.convoHistory.length > 24) {
    const recent = t.convoHistory.slice(-12);
    const older  = t.convoHistory.slice(0, -12);
    // 只提取用户行动作为摘要，AI回复太长不纳入
    // 玩家行动：每条限50字（行为路线记忆）
    const userSummary = older
      .filter(m => m.role === "user")
      .map(m => typeof m.content === "string" ? m.content.substring(0, 50) : "")
      .filter(Boolean)
      .join("；");
    // AI 回复：每条取前80字（保留叙事骨架和承诺，防止 AI 遗忘自己说过的话）
    // 只取 content 里不含 JSON 结构的部分（避免把完整 JSON 塞进去）
    const asstSummary = older
      .filter(m => m.role === "assistant")
      .map(m => {
        const raw = typeof m.content === "string" ? m.content : "";
        // 截取前80字，但跳过 JSON 结构字符（{ [ " 开头说明是纯JSON）
        if (raw.trimStart().startsWith("{") || raw.trimStart().startsWith("[")) return "";
        return raw.substring(0, 80).replace(/\n/g, " ").trim();
      })
      .filter(Boolean)
      .join(" | ");
    msgs = [
      { role:"user",      content: `[早期行动摘要]：${userSummary}${asstSummary ? "\n[早期叙事骨架]：" + asstSummary : ""}` },
      { role:"assistant", content: "[已记录]" },
      ...recent
    ];
  } else {
    msgs = t.convoHistory.slice(-22);
  }

  const body = {
    model: DS_MODEL,
    max_tokens: LENGTH_TOKENS[SETTINGS.narrativeLength] || 4000,
    temperature: 0.92,
    stream: true,
    messages: [{ role:"system", content: buildSystemPrompt() }, ...msgs]
  };

  const res = await fetch(DS_API, {
    method:"POST",
    headers:{"Content-Type":"application/json","Authorization":"Bearer "+API_KEY},
    body: JSON.stringify(body),
    signal: _abortCtrl ? _abortCtrl.signal : undefined
  });
  if (!res.ok) {
    const e = await res.json().catch(()=>({}));
    throw new Error(e.error?.message || "HTTP " + res.status);
  }

  const reader = res.body.getReader();
  const decoder = new TextDecoder();
  let fullText = "";

  // ── 模型类型判断：根据配置直接确定，不靠运行时 chunk 内容检测 ──
  // R1 条件：选了 ds-r1 预设，或者自定义模型名里包含 "reasoner"
  const isR1 = (DS_PRESET === "ds-r1") || DS_MODEL.includes("reasoner");

  // ── 思考块模式控制变量 ──
  let fakeStarted  = false; // 假打字机是否已启动（仅非 R1 模式使用）
  let hadRealThink = false; // 是否出现过 reasoning_content（仅 R1 模式使用）
  let thinkErased  = false; // 擦除动画是否已触发（避免重复触发）
  // _erasePromise：等删字动画完成后才让 iz 实时打字机开始
  let _erasePromise = null;

  // 非 R1 模式：processAction 已经在发请求前启动了假思考（两阶段）。
  // 这里只设 fakeStarted 标记，供后续 content 到来时的擦除逻辑判断。
  if (!isR1) {
    fakeStarted = true;
    // 防御：如果联网假思考还没停（极端情况），先停掉
    stopNetFakeThinking();
    // 如果思考块不存在，说明 processAction 没启动（直接调用 callDS 等情况）
    if (!document.getElementById("think-block-el")) {
      startFakeThinking(t.player?.name || t.charName, userMsg);
    }
  }

  // ── 实时打字机状态变量（支持最多两条消息：iz + narrator）──
  let streamBuf = "";
  let liveSlot       = 0;    // 当前追踪的是第几条消息（0=第一条，1=第二条）
  let liveSearchFrom = 0;    // 第二条消息开始时，从 streamBuf 的哪个位置起扫描
  let liveStartIdx   = -1;   // 当前 slot 的 content 字符串在 streamBuf 中的起始位置
  let liveEl         = null; // 当前 slot 对应的 DOM 元素
  let liveStreamType = "";   // "iz" 或 "narrator"
  let liveRenderedLen = 0;   // 已经渲染到 liveEl 的字符数
  // ★ 前驱等待 Promise：slot 0（iz）finalize 后存在这里，slot 1（narrator）用它等待
  let _prevSlotFinalizePromise = null;

  const LIVE_MARKER_IZ_RE = /"type"\s*:\s*"iz"[^}]{0,60}?"content"\s*:\s*"/;
  const LIVE_MARKER_NA_RE = /"type"\s*:\s*"narrator"[^}]{0,60}?"content"\s*:\s*"/;

  try {
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      const chunk = decoder.decode(value, { stream: true });

      for (const line of chunk.split("\n")) {
        if (!line.startsWith("data:")) continue;
        const data = line.slice(5).trim();
        if (data === "[DONE]") break;
        try {
          const parsed = JSON.parse(data);
          const delta = parsed.choices?.[0]?.delta || {};
          const thinkChunk   = delta.reasoning_content || "";
          const contentChunk = delta.content || "";

          if (!thinkChunk && !contentChunk) continue;

          // ── R1 真实思考内容（仅 R1 模式下才会出现 reasoning_content）──
          if (thinkChunk && isR1) {
            hadRealThink = true;
            if (!document.getElementById("think-block-el")) createThinkBlock();
            appendToThinkBlock(thinkChunk);
          }
          // 非 R1 模型收到了 reasoning_content（极罕见，容错处理）：忽略即可
          // thinkChunk && !isR1 → do nothing

          // ── 正式内容开始流入 ──
          if (contentChunk) {
            // 触发擦除（只触发一次）——R1 擦真思考块，V3 擦假思考块
            // ★ eraseThinkBlock 返回 Promise 存入 _erasePromise，
            //   iz 实时打字机把它注册为前驱，确保删字结束前不打字
            if (!thinkErased) {
              thinkErased = true;
              // 先停假打字机（幂等，R1 模式下 fakeStarted=false 无副作用）
              if (fakeStarted) stopFakeThinking();
              try {
                const thinkEl = document.getElementById("think-block-el");
                _erasePromise = thinkEl ? eraseThinkBlock(null) : Promise.resolve();
              } catch(eraseErr) {
                console.warn("[Think] erase failed:", eraseErr);
                _erasePromise = Promise.resolve();
              }
            }

            fullText += contentChunk;
            streamBuf += contentChunk;

            // ── 实时打字机（最多追踪两条：iz → narrator）──
            if (liveSlot < 2) {
              if (liveStartIdx === -1) {
                // 在 streamBuf 的 liveSearchFrom 之后扫描下一个匹配
                const searchRegion = streamBuf.slice(liveSearchFrom);
                const mIz = liveSlot === 0 ? LIVE_MARKER_IZ_RE.exec(searchRegion) : null;
                const mNa = LIVE_MARKER_NA_RE.exec(searchRegion);
                let chosen = null;
                if (mIz && mNa) chosen = mIz.index <= mNa.index ? mIz : mNa;
                else chosen = mIz || mNa;

                if (chosen) {
                  liveStartIdx = liveSearchFrom + chosen.index + chosen[0].length;
                  liveStreamType = chosen[0].includes('"iz"') ? "iz" : "narrator";
                  liveEl = createLiveTypewriterEl(liveStreamType); // { div, inner }

                  if (liveSlot === 0) {
                    // iz 和删字动画同时并行进行，不注册前驱等待
                    // _erasePromise 只用来做 DOM 清理，不阻塞打字机
                  } else if (liveSlot > 0 && _prevSlotFinalizePromise) {
                    // 第二条消息（narrator）：等 iz 打字机队列清空后才开始
                    _lwPredecessors.set(liveEl.inner, _prevSlotFinalizePromise);
                  }

                  const initial = extractJsonStringContent(streamBuf.slice(liveStartIdx));
                  if (initial) appendToLiveTypewriter(liveEl, initial);
                  liveRenderedLen = initial.length;
                }
              } else {
                // 追加新字符到当前 slot
                const allContent = extractJsonStringContent(streamBuf.slice(liveStartIdx));
                if (allContent.length > liveRenderedLen) {
                  appendToLiveTypewriter(liveEl, allContent.slice(liveRenderedLen));
                  liveRenderedLen = allContent.length;
                }
                // 在原始 streamBuf 里扫描结束引号，计算正确的原始文本偏移
                // 不能用 allContent.length（已解码），必须在原始字节里数
                const afterStart = streamBuf.slice(liveStartIdx);
                let escaped = false, endRawIdx = -1;
                for (let ci = 0; ci < afterStart.length; ci++) {
                  if (escaped) { escaped = false; continue; }
                  if (afterStart[ci] === "\\") { escaped = true; continue; }
                  if (afterStart[ci] === '"') { endRawIdx = ci; break; }
                }
                if (endRawIdx !== -1) {
                  // 消息结束：先保存引用，推进 slot 状态
                  const completedEl   = liveEl;
                  const completedType = liveStreamType;
                  liveSlot++;
                  liveSearchFrom = liveStartIdx + endRawIdx + 1;
                  liveStartIdx = -1;
                  liveRenderedLen = 0;
                  liveEl = null;
                  liveStreamType = "";
                  // ★ 把这个 slot 的 finalize promise 存起来，
                  //   供下一个 slot 的节点注册为前驱等待
                  _prevSlotFinalizePromise = finalizeLiveTypewriter(completedEl);
                  // 等队列消费完之后再打 liveComplete 标记
                  // 这样 addMessages 不会在字还没打完时就跳过这条消息
                  _prevSlotFinalizePromise.then(() => {
                    if (completedEl && completedEl.div)
                      completedEl.div.dataset.liveComplete = completedType;
                  });
                  // 两条消息（iz + narrator）实时打字机都结束了。
                  // 此时 net 帖子等后续内容还在 addMessages 的 await 队列里，
                  // 非 R1 模式：启动「对联网构想」填充这段等待期（比 typing-row 更沉浸）
                  // R1 模式：iz+narrator 都就位后还原 typing-row 作为等待指示
                  // 非 R1 模式：第二阶段联网假思考由 processAction 在 addMessages 全部完成后统一启动，
                  //             不在这里做——避免与 eraseThinkBlock 的异步淡出动画产生时序竞争。
                  if (liveSlot >= 2) {
                    const _liveIsR1 = (DS_PRESET === "ds-r1") || DS_MODEL.includes("reasoner");
                    if (_liveIsR1) {
                      const tr = document.getElementById("typing-row");
                      if (tr) tr.style.display = "flex";
                    }
                    // 非 R1 分支故意留空：processAction 负责后续
                  }
                }
              }
            }
          }

        } catch(_) {}
      }
    }
  } catch(streamErr) {
    if (streamErr.name !== "AbortError") throw streamErr;
    fullText += "__ABORTED__";
  }

  // 流结束：做一次全面清理，防止边缘情况残留
  stopFakeThinking(); // 幂等，safe to call even if fake thinking never started
  const remainThink = document.getElementById("think-block-el");
  if (remainThink && !thinkErased) remainThink.remove();

  // 实时打字机容器：等队列消费完再标记 liveComplete
  if (liveEl && liveEl.div) {
    const _finalEl = liveEl, _finalType = liveStreamType;
    finalizeLiveTypewriter(_finalEl).then(() => {
      if (_finalEl.div) _finalEl.div.dataset.liveComplete = _finalType;
    });
  }

  // 保存AI回复到对话历史
  t.convoHistory.push({ role:"assistant", content: fullText });
  // 防止历史无限增长，保留最近40条
  // Keep 20 turns; net message posts are stripped to summary-only to save tokens
  t.convoHistory = t.convoHistory.slice(-20).map(m => {
    if (m.role !== 'assistant') return m;
    // Strip net posts from assistant history (already stored in netMemory)
    try {
      const parsed = JSON.parse(m.content);
      if (parsed.messages) {
        parsed.messages = parsed.messages.map(msg => {
          if (msg.type === 'net') return { type: 'net', posts: (msg.posts||[]).map(p=>({user:p.user, content:(p.content||'').slice(0,60)})) };
          return msg;
        });
      }
      return { role: m.role, content: JSON.stringify(parsed) };
    } catch(e) { return m; }
  });

  const wasAborted = fullText.includes("__ABORTED__");
  let clean = fullText.replace("__ABORTED__","").trim()
    .replace(/^```json\s*/i,"").replace(/^```\s*/i,"").replace(/\s*```$/i,"").trim();
  const s = clean.indexOf("{"), e2 = clean.lastIndexOf("}");
  if (s !== -1 && e2 !== -1) clean = clean.slice(s, e2+1);
  try {
    return JSON.parse(clean);
  } catch(parseErr) {
    if (wasAborted) {
      const m = clean.match(/"content"\s*:\s*"((?:[^"\\]|\\.)*)"/);
      const txt = m ? m[1].replace(/\\n/g,"\n").replace(/\\"/g,'"') : "（已停止生成）";
      return {
        stateUpdate: null,
        messages: [{ type:"narrator", content: txt + "\n\n⬛ 已停止生成" }],
        options: [
          { id:1, text:"继续刚才的内容", type:"normal" },
          { id:2, text:"【问伊兹】总结当前状态", type:"iz" }
        ]
      };
    }
    throw parseErr;
  }
}

// ════════════════════════════════════════════════════════
//  BACKNET 智能记忆过滤器
//
//  设计理念：
//  - 纯客户端关键词判断，零 API 额外消费
//  - 对每条帖子打重要度分（1低/2中/3高）和标签
//  - summary = 帖子里信息密度最高的那一句，严格限40字
//  - 注入 Prompt 时只带 importance≥2 的最近5条 summary
//    格式：[T{回合}·{tag}] {summary}
//    这样整个舆论记忆在 Prompt 里只占约200字
// ════════════════════════════════════════════════════════

// 标签关键词表（顺序即优先级）
const NET_TAG_RULES = [
  { tag:"委托", keywords:["委托","悬赏","任务","雇佣","报酬","招募","收购","出售","佣金"] },
  { tag:"威胁", keywords:["警告","危险","致命","实体","追踪","禁区","净化","消失","失踪","死亡"] },
  { tag:"线索", keywords:["发现","找到","坐标","路线","出口","安全屋","地图","秘密","真相"] },
  { tag:"组织", keywords:["M.E.G","BNTG","B.N.T.G","皮尔斯","卫队","工业","协会","委员会","黑市"] },
  { tag:"奇怪", keywords:["不明","诡异","奇怪","无法解释","仪式","预言","梦","幻觉","消失"] },
  { tag:"情报", keywords:["层级","Level","后室","幸存者","报告","目击","记录","探索"] },
];

// 重要度关键词（出现得越高分越高）
const NET_HIGH_IMPORTANCE = ["委托","悬赏","警告","致命","坐标","出口","秘密","真相","失踪","死亡","预言"];
const NET_MED_IMPORTANCE  = ["发现","找到","危险","实体","任务","报酬","组织","地图","目击"];

function classifyNetPost(text) {
  if (!text) return { importance: 1, tags: ["情报"] };
  const t = text.toLowerCase();
  // 标签：找第一个匹配的规则
  const tags = NET_TAG_RULES
    .filter(r => r.keywords.some(k => text.includes(k)))
    .map(r => r.tag)
    .slice(0, 2); // 最多两个标签
  if (!tags.length) tags.push("情报");
  // 重要度
  const hi = NET_HIGH_IMPORTANCE.some(k => text.includes(k));
  const md = NET_MED_IMPORTANCE.some(k => text.includes(k));
  const importance = hi ? 3 : md ? 2 : 1;
  return { importance, tags };
}

// 从一轮 net 消息的所有帖子里提取最具信息量的 summary（≤40字）
function extractNetSummary(posts, turnNum) {
  if (!posts || !posts.length) return `T${turnNum}的BackNet动态`;
  // 优先取重要度最高的帖子的正文前40字
  let best = posts[0];
  let bestScore = 0;
  for (const p of posts) {
    const { importance } = classifyNetPost(p.content || "");
    if (importance > bestScore) { bestScore = importance; best = p; }
  }
  const raw = (best.content || "").replace(/\n/g, " ").trim();
  // 截取到40字，优先在句号/逗号处断句
  let sum = raw.substring(0, 40);
  const cutAt = Math.max(sum.lastIndexOf("。"), sum.lastIndexOf("，"), sum.lastIndexOf("、"));
  if (cutAt > 15) sum = sum.substring(0, cutAt + 1);
  if (raw.length > sum.length) sum += "…";
  return sum || `T${turnNum}的BackNet动态`;
}

// 判断一轮 net 是否值得以高重要度保留进 AI 记忆
function calcTurnImportance(posts) {
  if (!posts || !posts.length) return 1;
  return Math.max(...posts.map(p => classifyNetPost(p.content || "").importance));
}

// 保存一轮 BackNet 到 netMemory，同时维护过滤规则：
//  - 总量上限 150 条，溢出时优先删除 importance=1 的旧条目
//  - importance=3 的条目永不被自动删除（上限60条单独保护）
function saveToNetMemory(t, turn, posts) {
  t.netMemory = t.netMemory || [];
  const importance  = calcTurnImportance(posts);
  const allTags     = [...new Set(posts.flatMap(p => classifyNetPost(p.content||"").tags))].slice(0,3);
  const summary     = extractNetSummary(posts, turn);
  const entry = { turn, importance, tags: allTags, summary, posts };

  t.netMemory.push(entry);

  // 自动修剪：importance=1 超过50条时删最老的
  const low = t.netMemory.filter(e => e.importance === 1);
  if (low.length > 50) {
    const toRemove = low.slice(0, low.length - 50).map(e => e.turn);
    t.netMemory = t.netMemory.filter(e => e.importance > 1 || !toRemove.includes(e.turn));
  }
  // importance=2/3 总量超过100时删最老的importance=2
  const hiMed = t.netMemory.filter(e => e.importance >= 2);
  if (hiMed.length > 100) {
    const med2 = hiMed.filter(e => e.importance === 2).slice(0, hiMed.length - 100);
    const toRemove2 = med2.map(e => e.turn);
    t.netMemory = t.netMemory.filter(e => e.importance >= 3 || !toRemove2.includes(e.turn));
  }
}

// ════════════════════════════════════════════════════════
//  STATE UPDATE
// ════════════════════════════════════════════════════════
function applyUpdate(u, resp) {
  if (!u && !resp) return;
  const t = getActive();
  const p = t.player;

  if (u) {
    if (u.hp        !== undefined) p.hp        = Math.max(0, Math.min(p.hpMax, u.hp));
    if (u.sanity    !== undefined) p.sanity    = Math.max(0, Math.min(p.sanityMax, u.sanity));
    if (u.energy    !== undefined) p.energy    = Math.max(0, Math.min(p.energyMax, u.energy));
    if (u.location)     p.location     = u.location;
    if (u.currentLevel) p.currentLevel = u.currentLevel;
    if (u.levelCode)    p.levelCode    = u.levelCode;
    if (u.threat    !== undefined) p.threat        = u.threat;
    if (u.statusEffects)           p.statusEffects = u.statusEffects;
    if (u.devourExp !== undefined) p.devourExp = Math.max(0, u.devourExp);
    if (u.devourLevel !== undefined && u.devourLevel > p.devourLevel) {
      p.devourLevel  = u.devourLevel;
      p.devourExpMax = u.devourLevel * 100;
    }
    if (u.newDevourSkill) p.devourSkills.push(u.newDevourSkill);
    if (u.newAbsorbed)    p.devourAbsorbed.push(u.newAbsorbed);
    (u.inventoryChanges||[]).forEach(ch => {
      if (ch.action === "add") {
        const ex = t.inventory.find(i=>i.name===ch.name);
        if (ex) ex.qty += (ch.qty||1);
        else t.inventory.push({name:ch.name,qty:ch.qty||1,desc:ch.desc||""});
      } else if (ch.action === "remove") {
        const idx = t.inventory.findIndex(i=>i.name===ch.name);
        if (idx !== -1) {
          t.inventory[idx].qty -= (ch.qty||1);
          if (t.inventory[idx].qty <= 0) t.inventory.splice(idx,1);
        }
      }
    });
  }

  if (resp && resp.npcUpdate) {
    const nu = resp.npcUpdate;
    if (nu.action === "remove" && nu.id) {
      // AI主动宣告这个NPC死亡/永久消失，无论重要与否直接移除
      t.npcRoster = t.npcRoster.filter(n => n.id !== nu.id);
    } else if (nu.name) {
      // 新增或更新NPC记录
      const existing = t.npcRoster.find(n => n.id === nu.id || n.name === nu.name);
      if (existing) {
        Object.assign(existing, nu);
        existing.lastInteractTurn = t.turn; // 刷新最后互动回合
      } else {
        t.npcRoster.push({
          id: nu.id || Date.now().toString(),
          name: nu.name,
          relation: nu.relation || "neutral",
          desc: nu.desc || "",
          lastSeen: nu.lastSeen || "",
          important: nu.important === true, // 必须AI明确标true才算重要
          lastInteractTurn: t.turn,
        });
      }
    }
  }

  // 每回合结束时自动清理过期的普通NPC
  // important:true 的角色完全不受影响
  t.npcRoster = t.npcRoster.filter(n => {
    if (n.important) return true;
    const lastTurn = n.lastInteractTurn ?? 0;
    return (t.turn - lastTurn) <= 10;
  });

  if (resp && resp.levelUpdate && resp.levelUpdate.code) {
    const lu = resp.levelUpdate;
    const isNewLevel = !t.levelLog.find(l => l.code === lu.code);
    if (isNewLevel) {
      t.levelLog.push({ code: lu.code, name: lu.name || "", desc: lu.desc || "", dangerRating: lu.dangerRating || "med", visitedAt: new Date().toLocaleString("zh-CN") });
      // 将层级信息作为 levelup 消息注入到 resp.messages 末尾（net之前）
      // 这样 addMessages 会以打字机特效展示它
      if (resp.messages) {
        const dangerLabel = { low:"低危", med:"中危", high:"高危", extreme:"极危" }[lu.dangerRating] || "未知";
        const levelupMsg = {
          type: "levelup",
          content: `进入新层级：${lu.code}${lu.name ? " · " + lu.name : ""}\n危险等级：${dangerLabel}\n${lu.desc || ""}`
        };
        // 插在 net 类型消息之前（net 永远最后）
        const netIdx = resp.messages.findIndex(m => m.type === "net");
        if (netIdx !== -1) resp.messages.splice(netIdx, 0, levelupMsg);
        else resp.messages.push(levelupMsg);
      }
    } else {
      // 已知层级：只更新记录，不推新消息
      const existing = t.levelLog.find(l => l.code === lu.code);
      if (existing) Object.assign(existing, { name: lu.name || existing.name, desc: lu.desc || existing.desc, dangerRating: lu.dangerRating || existing.dangerRating });
    }
  }

  // Archive BackNet messages → 新版智能记忆过滤器
  if (resp && resp.messages) {
    resp.messages.filter(m => m.type === "net").forEach(m => {
      // 写入新的 netMemory（带重要度/标签/summary 过滤）
      saveToNetMemory(t, t.turn + 1, m.posts || []);
      // 舆论动态入队
      const _nmEntry = (t.netMemory || []).find(e => e.turn === t.turn + 1);
      if (_nmEntry) {
        const _imp = _nmEntry.importance >= 3 ? "purge" : _nmEntry.importance === 2 ? "net" : "new";
        const _impLbl = _nmEntry.importance >= 3 ? "高重要" : _nmEntry.importance === 2 ? "中重要" : "情报";
        queueDrawerItem({ dotType: _imp, label: "BackNet舆论", badge: _impLbl, badgeCls: _nmEntry.importance >= 3 ? "purge" : "", text: _nmEntry.summary || "" });
      }
      // 同时写旧的 backnетArchive 保持面板兼容（面板后面会统一改）
      t.backnетArchive = t.backnетArchive || [];
      t.backnетArchive.push({ turn: t.turn + 1, posts: m.posts });
      if (t.backnетArchive.length > 100) t.backnетArchive.shift();
    });
  }

  // ── 层级系统首次介绍：进入「新」层级且从未介绍过时，追加到第一条 iz 消息末尾 ──
  // 不限制 turn，只要是新层级就触发一次
  if (resp && resp.levelUpdate && resp.levelUpdate.code && !t._levelIntroShown) {
    const isNewLevel = !t.levelLog.find(l => l.code === resp.levelUpdate.code);
    if (isNewLevel && resp.messages) {
      t._levelIntroShown = true;
      const pname = t.player?.name || "主角";
      const introSuffix = `

顺带一提，${pname}——层级系统是我的核心功能之一。我能实时感知你所在的后室层级，从数据库调取已知的危险评级与特征情报。每当你踏入新层级，我都会第一时间告知你。这是你活下去的基础信息。`;
      // 追加到第一条 iz 消息的 content 末尾
      const firstIz = resp.messages.find(m => m.type === "iz");
      if (firstIz) firstIz.content = (firstIz.content || "") + introSuffix;
      else resp.messages.unshift({ type: "iz", content: introSuffix.trim() });
    }
  }

  // ── 舆论系统首次介绍：首次出现 net 消息时，追加到第一条 iz 消息末尾 ──
  // 条件：turn > 0（玩家已确认状态）、有 net、且从未介绍过
  if (resp && resp.messages && !t._netIntroShown && t.turn > 0) {
    const hasNet = resp.messages.some(m => m.type === "net");
    if (hasNet) {
      t._netIntroShown = true;
      const pname = t.player?.name || "主角";
      const netSuffix = `

还有一件事要告诉你，${pname}——我可以接入后室的地下信息网络，BackNet。这是幸存者自建的匿名论坛网络，乱得像一个永远不会关闭的混沌集市。里头有各路组织发布的委托与公告、幸存者互相争论的目击记录、来历不明的奇怪帖子，还有不少我也无法判断真假的信息。你可以把它当情报来源，但可信度需要你自己判断。接下来你就能看到了。`;
      const firstIz = resp.messages.find(m => m.type === "iz");
      if (firstIz) firstIz.content = (firstIz.content || "") + netSuffix;
      else {
        // 如果没有 iz 消息（理论上不应出现，作防御处理），在 net 前插新 iz
        const firstNetIdx = resp.messages.findIndex(m => m.type === "net");
        const introMsg = { type: "iz", content: netSuffix.trim() };
        if (firstNetIdx !== -1) resp.messages.splice(firstNetIdx, 0, introMsg);
        else resp.messages.push(introMsg);
      }
    }
  }

  t.turn++;
  if (t.turn === 1) t.name = p.currentLevel + " · " + new Date().toLocaleDateString("zh-CN");
  t.lastPlayedAt = new Date().toLocaleString("zh-CN");
  updateStatusBar();
  saveAll();
}

function generateSceneImage(imagePrompt) {
  if (!IMG_ON || !imagePrompt) return null;
  if (SF_KEY) return { type:"sf", prompt: IMG_STYLE+imagePrompt, seed: Math.floor(Math.random()*99999) };
  const fullPrompt = encodeURIComponent(IMG_STYLE+imagePrompt);
  const seed = Math.floor(Math.random()*9999);
  return { type:"poll", url: `${POLL_API}${fullPrompt}?width=640&height=360&seed=${seed}&nologo=true` };
}

async function fetchSFImage(imgId, prompt, seed) {
  try {
    const res = await fetch(SF_API, {
      method:"POST",
      headers:{"Content-Type":"application/json","Authorization":"Bearer "+SF_KEY},
      body: JSON.stringify({ model:SF_IMG_MODEL, prompt, image_size:"768x432", seed:seed||42, num_inference_steps:4 })
    });
    if (!res.ok) throw new Error("SF HTTP "+res.status);
    const data = await res.json();
    const url = data.images?.[0]?.url;
    if (!url) throw new Error("SF: 无图片URL");
    const loadEl = document.getElementById("img-load-"+imgId);
    const imgEl  = document.getElementById("img-"+imgId);
    if (imgEl)  { imgEl.src = url; imgEl.style.display = "block"; }
    if (loadEl) { loadEl.style.display = "none"; }
  } catch(err) {
    const loadEl = document.getElementById("img-load-"+imgId);
    if (loadEl) loadEl.innerHTML = "（配图生成失败："+err.message+"）";
  }
}

function esc(s) { return s ? String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;") : ""; }
function nl(s)  { return esc(s).replace(/\n/g,"<br>"); }

let _msgRenderCounter = 0;

function renderMsgObj(msg, forceId) {
  const div = document.createElement("div");
  div.className = "msg";
  const msgId = forceId || ("msg-"+(++_msgRenderCounter));
  div.id = msgId;
  div.dataset.msgId = msgId;

  switch(msg.type) {
    case "scene-img":
      div.innerHTML = `<div class="scene-img-wrap">
        <div class="scene-img-loading" id="img-load-${msg.imgId}">🖼️ 场景渲染中…</div>
        <img class="scene-img" id="img-${msg.imgId}" src="${esc(msg.src)}" style="display:none"
          onload="document.getElementById('img-load-${msg.imgId}').style.display='none';this.style.display='block'"
          onerror="document.getElementById('img-load-${msg.imgId}').innerHTML='（场景配图加载失败）'">
      </div>`; break;

    case "narrator":
      div.innerHTML = `<div style="max-width:80%"><div class="m-narrator">${nl(msg.content)}</div></div>`; break;
    case "iz": {
      div.innerHTML = `<div class="bubble-wrap">
        <div class="iz-av-bubble" title="点击设定伊兹人格">伊</div>
        <div class="m-iz">
          <div class="iz-hdr">
            <div>
              <div class="iz-nm">伊兹 · IZ${IZ_PERSONA ? '<span class="iz-active-badge">已设定</span>' : ''}</div>
              <div class="iz-tg">神经接入 · 仅主角可见</div>
            </div>
          </div>
          <div class="iz-body">${nl(msg.content)}</div>
        </div>
      </div>`;
      const izAvEl = div.querySelector(".iz-av-bubble");
      if (izAvEl) {
        const _open = (e) => { e.preventDefault(); e.stopPropagation(); openIzPersonaModal(); };
        izAvEl.addEventListener("touchend", _open, { passive:false });
        izAvEl.addEventListener("click", _open);
      }
      break;
    }
    case "dialog":
      div.innerHTML = `<div style="max-width:80%"><div class="m-dialog">
        <div class="dlg-sp" style="color:${esc(msg.color||"#e0dcd4")}">${esc(msg.speaker)} 说道</div>
        <div class="dlg-tx">"${nl(msg.content)}"</div>
      </div></div>`; break;
    case "net": {
      const posts = (msg.posts||[]).map(p => {
        const replies = (p.replies||[]).map(r => `<div class="net-r"><b style="color:var(--cold)">${esc(r.user)}：</b>${esc(r.content)}</div>`).join("");
        return `<div class="net-post"><div class="net-u">【${esc(p.user)}】</div><div class="net-c">${nl(p.content)}</div>${replies}<div class="net-t">${esc(p.time)} · BackNet</div></div>`;
      }).join("");
      div.innerHTML = `<div class="m-net"><div class="net-hdr">📡 BackNet · 后室网络实时动态</div>${posts}</div>`;
      break;
    }
    case "devour":
      div.innerHTML = `<div class="m-devour">
        <div class="dv-title">⚡ 暴食系统激活 ⚡</div>
        <div class="dv-body"><b>目标：</b>${esc(msg.target)}<br>${nl(msg.description)}</div>
        ${msg.gained ? `<div class="dv-gain">▲ 获得：${esc(msg.gained)}</div>` : ""}
      </div>`; break;
    case "system":
      div.innerHTML = `<div class="m-system">⚠ ${esc(msg.content)} ⚠</div>`; break;
    case "levelup":
      div.innerHTML = `<div class="m-levelup">★ 暴食等级提升 ★<br><br>${nl(msg.content)}</div>`; break;
    case "error":
      div.innerHTML = `<div class="m-error">⚠ 伊兹的信号出现了干扰…<br><small style="font-size:13px;opacity:0.75;display:block;margin-top:4px">${esc(msg.content)}</small></div>`; break;
    case "quoted-msg": {
      const inner = renderMsgObj(msg.innerMsg, msgId+"-inner");
      if (!inner) return null;
      const qDiv = document.createElement("div");
      qDiv.className = "msg"; qDiv.id = msgId; qDiv.dataset.msgId = msgId;
      const qBar = document.createElement("div");
      qBar.className = "quote-preview"; qBar.dataset.targetId = msg.quotedMsgId;
      qBar.innerHTML = `<span class="qp-icon">引用</span><span class="qp-text">${esc(msg.quotedPreview)}</span><span class="qp-go">↗</span>`;
      qBar.onclick = (e) => { e.stopPropagation(); jumpToMsg(msg.quotedMsgId); };
      qDiv.appendChild(qBar);
      Array.from(inner.children).forEach(c => { if (!c.classList.contains("msg-action-bar")) qDiv.appendChild(c); });
      attachMsgActions(qDiv, msg.innerMsg);
      return qDiv;
    }
    default:
      if (msg._html) { div.innerHTML = msg._html; }
      else return null;
  }

  const noAction = ["scene-img","error"].includes(msg.type);
  if (!noAction) attachMsgActions(div, msg);
  return div;
}

function attachMsgActions(div, msg) {
  const bar = document.createElement("div");
  bar.className = "msg-action-bar";
  bar.innerHTML = `
    <button title="复制" onclick="event.stopPropagation();copyMsg(this)">📋</button>
    <button title="引用" onclick="event.stopPropagation();quoteMsg('${div.id}',this)">💬</button>
    <button title="编辑并重发" onclick="event.stopPropagation();editMsg(this)">✏️</button>
    <button title="重新加载" onclick="event.stopPropagation();reloadMsg('${div.id}')">🔄</button>`;
  div.appendChild(bar);
  div.addEventListener("click", (e) => {
    if (e.target.closest(".msg-action-bar,.quote-preview,.iz-av")) return;
    toggleMsgAction(div);
  });
}

function toggleMsgAction(div) {
  const wasActive = div.classList.contains("active-msg");
  document.querySelectorAll(".msg.active-msg").forEach(m => m.classList.remove("active-msg"));
  if (!wasActive) div.classList.add("active-msg");
}

document.addEventListener("click", (e) => {
  const gs = document.getElementById("game-screen");
  if (!gs || gs.style.display === "none") return;
  if (!e.target.closest(".msg")) document.querySelectorAll(".msg.active-msg").forEach(m => m.classList.remove("active-msg"));
  if (!e.target.closest(".plus-menu") && !e.target.closest(".plus-btn") && document.getElementById("plus-menu-container").innerHTML) closePlusMenu();
  if (!e.target.closest(".more-menu") && !e.target.closest("#more-nav-btn") && document.getElementById("more-menu-container").innerHTML) closeMoreMenu();
});

function copyMsg(btn) {
  const msgDiv = btn.closest(".msg");
  const clone = msgDiv.cloneNode(true);
  clone.querySelectorAll(".msg-action-bar,.quote-preview").forEach(e=>e.remove());
  navigator.clipboard.writeText((clone.innerText||clone.textContent||"").trim()).catch(()=>{});
  btn.textContent = "✅"; setTimeout(()=>{btn.textContent="📋";},1200);
}

let _pendingQuote = null;

function quoteMsg(msgId, btn) {
  const msgDiv = document.getElementById(msgId);
  if (!msgDiv) return;
  const clone = msgDiv.cloneNode(true);
  clone.querySelectorAll(".msg-action-bar,.quote-preview").forEach(e=>e.remove());
  _pendingQuote = { msgId, preview: (clone.innerText||clone.textContent||"").trim().substring(0,120) };
  renderInputQuote();
  document.getElementById("cinput").focus();
  document.querySelectorAll(".msg.active-msg").forEach(m=>m.classList.remove("active-msg"));
}

function renderInputQuote() {
  const c = document.getElementById("input-quote-container");
  if (!_pendingQuote) { c.innerHTML = ""; return; }
  c.innerHTML = `<div class="input-quote-wrap">
    <span style="color:var(--gold);font-size:12px;font-family:'Share Tech Mono',monospace;flex-shrink:0">引用</span>
    <span class="iq-text">${esc(_pendingQuote.preview)}</span>
    <button class="iq-close" onclick="clearInputQuote()">✕</button>
  </div>`;
}
function clearInputQuote() { _pendingQuote = null; renderInputQuote(); }

function editMsg(btn) {
  const msgDiv = btn.closest(".msg");
  const clone = msgDiv.cloneNode(true);
  clone.querySelectorAll(".msg-action-bar,.quote-preview").forEach(e=>e.remove());
  document.getElementById("cinput").value = (clone.innerText||clone.textContent||"").trim().substring(0,200);
  document.getElementById("cinput").focus();
  document.querySelectorAll(".msg.active-msg").forEach(m=>m.classList.remove("active-msg"));
}

function reloadMsg(msgId) {
  if (processing) return;
  document.querySelectorAll(".msg.active-msg").forEach(m=>m.classList.remove("active-msg"));
  const t = getActive();
  if (!t.convoHistory.length) return;
  const lastUser = [...t.convoHistory].reverse().find(m => m.role === "user");
  if (!lastUser) return;
  const lastAssIdx = t.convoHistory.map(m=>m.role).lastIndexOf("assistant");
  if (lastAssIdx !== -1) t.convoHistory.splice(lastAssIdx, 1);
  processAction(lastUser.content);
}

function jumpToMsg(msgId) {
  const el = document.getElementById(msgId);
  if (!el) return;
  el.scrollIntoView({ behavior:"smooth", block:"center" });
  el.classList.remove("flash-hl"); void el.offsetWidth; el.classList.add("flash-hl");
  setTimeout(()=>el.classList.remove("flash-hl"), 1300);
}

// ── addMsgToFeed：返回 Promise，在打字机完成后 resolve ──
// 这样 addMessages 可以用 await 串行调用，确保 iz 打完了才开始 narrator
function addMsgToFeed(msgObj, save=true) {
  const feed = document.getElementById("feed");
  const typing = document.getElementById("typing-row");
  const el = renderMsgObj(msgObj);
  if (!el) return Promise.resolve();
  if (typing) feed.insertBefore(el, typing);
  else feed.appendChild(el);

  // ── 打字机效果（通用）──
  // 根据消息类型找到对应的文字容器，然后逐字显示
  const typewriterConfig = (() => {
    switch (msgObj.type) {
      case "iz":
        return { el: el.querySelector(".iz-body"), text: msgObj.content };
      case "narrator":
        return { el: el.querySelector(".m-narrator"), text: msgObj.content };
      case "dialog":
        return { el: el.querySelector(".dlg-tx"), text: '"' + (msgObj.content || "") + '"' };
      case "devour":
        return { el: el.querySelector(".dv-body"), text: (msgObj.description || "") };
      case "system":
        // 系统消息带图标前缀，不适合打字机，保持瞬间显示
        return null;
      case "levelup":
        return { el: el.querySelector(".m-levelup"), text: msgObj.content };
      case "net":
        // net 消息：逐帖淡入，每帖正文逐字打字机，完全照搬 iz/narrator 的打字特性
        return { el: null, text: null, isNet: true, netEl: el };
      default:
        // scene-img、error 等结构复杂，保持原样瞬间显示
        return null;
    }
  })();

  // 保存消息到存档（不管有没有打字机都先存）
  if (save) {
    const t = getActive();
    t.renderedMessages = t.renderedMessages || [];
    if (t.renderedMessages.length > 60) t.renderedMessages.shift();
    t.renderedMessages.push(msgObj);
  }
  updateScrollBtns();

  // ── net 消息：逐帖淡入 + 帖内正文逐字打字机 ──
  if (typewriterConfig && typewriterConfig.isNet) {
    const netWrap = typewriterConfig.netEl;
    const posts = netWrap.querySelectorAll(".net-post");
    if (!posts.length) { feed.scrollTop = feed.scrollHeight; return Promise.resolve(); }

    // 从原始 msgObj.posts 数据取正文，避免 DOM innerText 在移动端 layout 前返回空
    const rawPosts = (msgObj.posts || []);

    // 先把所有帖子隐藏，等待逐个显示
    posts.forEach(p => { p.style.opacity = "0"; p.style.transition = "opacity 0.3s ease"; });

    return new Promise(resolve => {
      let postIdx = 0;

      function showNextPost() {
        if (postIdx >= posts.length) {
          feed.scrollTop = feed.scrollHeight;
          resolve();
          return;
        }
        const post = posts[postIdx];
        const rawPost = rawPosts[postIdx] || {};
        postIdx++;

        // 先淡入帖子容器（标题、时间等立即可见）
        post.style.opacity = "1";
        feed.scrollTop = feed.scrollHeight;

        // 找到正文节点逐字打字（.net-c）
        const contentEl = post.querySelector(".net-c");
        if (!contentEl) {
          setTimeout(showNextPost, 200);
          return;
        }

        // 直接从原始数据取正文，不依赖 DOM innerText
        const fullText = String(rawPost.content || "");
        if (!fullText) {
          // 无正文，直接进下一帖
          setTimeout(showNextPost, 160);
          return;
        }

        contentEl.innerHTML = ""; // 清空已渲染的 HTML，准备逐字打
        let charIdx = 0;

        const typeTimer = setInterval(() => {
          if (charIdx >= fullText.length) {
            clearInterval(typeTimer);
            // 打完后用 nl() 收尾，确保 \n 正确转成 <br>
            contentEl.innerHTML = nl(fullText);
            feed.scrollTop = feed.scrollHeight;
            // 帖间停顿 160ms，再显示下一帖
            setTimeout(showNextPost, 160);
            return;
          }
          watchdogBeat(); // 每个字符都刷新心跳，让自检系统知道打字机仍在工作
          const char = fullText[charIdx];
          if (char === "\n")      contentEl.innerHTML += "<br>";
          else if (char === "<")  contentEl.innerHTML += "&lt;";
          else if (char === ">")  contentEl.innerHTML += "&gt;";
          else if (char === "&")  contentEl.innerHTML += "&amp;";
          else                    contentEl.innerHTML += char;
          charIdx++;
          if (charIdx % 5 === 0) feed.scrollTop = feed.scrollHeight;
        }, 80); // 与 iz/narrator 完全一致：80ms/字
      }

      // 首帖前稍作停顿，让 net 容器头部标题先完整显示
      setTimeout(showNextPost, 120);
    });
  }

  // 如果不需要打字机效果，立即 resolve
  if (!typewriterConfig || !typewriterConfig.el || !typewriterConfig.text) {
    feed.scrollTop = feed.scrollHeight;
    return Promise.resolve();
  }

  // 返回一个 Promise：打字机打完才 resolve
  return new Promise((resolve) => {
    const targetEl = typewriterConfig.el;
    const fullText = typewriterConfig.text;

    targetEl.innerHTML = "";
    let charIdx = 0;

    const typeTimer = setInterval(() => {
      if (charIdx >= fullText.length) {
        clearInterval(typeTimer);
        // 打完后用原始渲染方式收尾，确保换行等格式正确
        if (msgObj.type === "dialog") {
          targetEl.innerHTML = nl('"' + (msgObj.content || "") + '"');
        } else {
          targetEl.innerHTML = nl(fullText);
        }
        feed.scrollTop = feed.scrollHeight;
        resolve(); // ← 打字机完成，通知等待者可以继续了
        return;
      }
      watchdogBeat(); // 刷新心跳

      const char = fullText[charIdx];
      if (char === "\n") {
        targetEl.innerHTML += "<br>";
      } else if (char === "<") {
        targetEl.innerHTML += "&lt;";
      } else if (char === ">") {
        targetEl.innerHTML += "&gt;";
      } else if (char === "&") {
        targetEl.innerHTML += "&amp;";
      } else {
        targetEl.innerHTML += char;
      }

      charIdx++;
      if (charIdx % 5 === 0) feed.scrollTop = feed.scrollHeight;
    }, 80); // 80ms 一个字
  });
}

// ── addMessages：串行执行，iz 打完后才开始 narrator ──
//
// 联网构想时序（非 R1 模式）：
//   阶段A：iz/narrator 全部通过 addMsgToFeed 打字完成（不是"跳过"，是真正打完）
//           → 如果后续还有 levelup/net，此时才创建思考块并启动联网构想打字
//   阶段B：循环走到第一个 levelup 或 net 消息时
//           → 停联网构想打字 + 启动逐字删除（不 await，与该消息打字机并行）
//
// 注意：实时打字机"跳过"的 iz/narrator 不在这里启动联网构想，
//       因为那时打字机队列可能还没消费完。改为在循环体最末尾
//       遇到第一个 levelup/net 之前统一处理。
async function addMessages(msgs, _isR1) {

  const _liveIsR1 = _isR1 !== undefined ? _isR1 : ((DS_PRESET === "ds-r1") || DS_MODEL.includes("reasoner"));

  // 收集已实时渲染完成的节点（type → div 映射）
  const liveCompleteMap = new Map();
  document.querySelectorAll(".msg[data-live-complete]").forEach(el => {
    liveCompleteMap.set(el.dataset.liveComplete, el);
  });
  const skippedCount = {};

  // 联网构想是否已启动（防止重复）
  let _netFakeStarted    = false;
  // 联网构想的删除是否已触发（防止重复）
  let _netEraseTriggered = false;

  // 后续消息里是否有 levelup 或 net（只有这种情况才需要联网构想过渡动画）
  const hasLaterInfo = msgs.some(x => x.type === "levelup" || x.type === "net");

  for (const m of msgs) {
    watchdogBeat();

    // ── 实时打字机已渲染过的消息：跳过重复渲染，存档即可 ──
    const liveDiv = liveCompleteMap.get(m.type);
    if (liveDiv && !skippedCount[m.type]) {
      skippedCount[m.type] = true;
      liveDiv.removeAttribute("data-live-complete");
      const t = getActive();
      t.renderedMessages = t.renderedMessages || [];
      if (t.renderedMessages.length > 60) t.renderedMessages.shift();
      t.renderedMessages.push(m);
      // iz/narrator 被跳过时不启动联网构想，等到正式的 levelup/net 消息前统一处理
      continue;
    }

    // ── 即将处理 levelup 或 net 消息：先处理联网构想 ──
    if (!_liveIsR1 && (m.type === "levelup" || m.type === "net")) {

      if (!_netFakeStarted && hasLaterInfo) {
        // iz/narrator 全部都已实时跳过（liveCompleteMap 里有）但联网构想还没启动：
        // 说明这是第一个后期信息，且前置消息都是跳过的，现在补启动联网构想并给一点时间展示
        const izLive = liveCompleteMap.has("iz")       || skippedCount["iz"];
        const naLive = liveCompleteMap.has("narrator")  || skippedCount["narrator"];
        // 如果 iz/narrator 都已通过某种方式处理完，且联网构想还没起，
        // 给一个短暂的联网构想展示（1.5秒）再进行删除
        if (izLive && naLive) {
          _netFakeStarted = true;
          const stale = document.getElementById("think-block-el");
          if (stale) stale.remove();
          createThinkBlock();
          startNetFakeThinking(getActive().player?.currentLevel || "");
          await new Promise(r => setTimeout(r, 1500)); // 展示1.5秒联网构想再删
        }
      }

      if (!_netEraseTriggered) {
        _netEraseTriggered = true;
        const thinkEl = document.getElementById("think-block-el");
        if (thinkEl) {
          stopNetFakeThinking();
          eraseThinkBlock(null); // 不 await：删除与打字机并行
        }
      }
    }

    // ── 正式打字 ──
    await addMsgToFeed(m);

    // ── iz/narrator 打字完成：现在才是启动联网构想的正确时机 ──
    if (!_liveIsR1 && !_netFakeStarted && hasLaterInfo && m.type === "narrator") {
      // narrator 串行打完 = iz 也必然已打完（串行保证）
      _netFakeStarted = true;
      const stale = document.getElementById("think-block-el");
      if (stale) stale.remove();
      createThinkBlock();
      startNetFakeThinking(getActive().player?.currentLevel || "");
    }

    // 消息间自然停顿
    await new Promise(r => setTimeout(r, 120));
  }

  // 循环结束：如果联网构想因没有 levelup/net 而从未被删除，统一快速清理
  if (!_liveIsR1 && !_netEraseTriggered) {
    stopNetFakeThinking();
    const remainThink = document.getElementById("think-block-el");
    if (remainThink) await eraseThinkBlockFast();
  }

  document.getElementById("feed").scrollTop = 99999;
}

function showTyping() {
  const feed = document.getElementById("feed");
  let t = document.getElementById("typing-row");
  if (!t) {
    t = document.createElement("div");
    t.id = "typing-row";
    feed.appendChild(t);
  }
  // 每次显示前都强制重置成动画状态
  // 防止上一轮流式渲染留下的残留内容干扰这一轮
  t.className = "typing";
  t.style.display = "flex";
  t.innerHTML = `<div style="display:flex;flex-direction:column;gap:5px;width:100%">
    <div style="display:flex;align-items:center;gap:8px">
      <div class="iz-av-bubble" style="cursor:default;flex-shrink:0">伊</div>
      <div class="typing-dots"><div class="td"></div><div class="td"></div><div class="td"></div></div>
      <div class="typing-lbl">伊兹正在传输…</div>
    </div>
    <div id="typing-subtitle" style="display:none;padding-left:32px;min-height:20px"></div>
  </div>`;
  feed.scrollTop = feed.scrollHeight;
}

function hideTyping() {
  const t = document.getElementById("typing-row");
  if (t) {
    // 同时重置 className，防止流式渲染把它改成 "msg" 之后
    // hideTyping 找到元素但样式状态混乱
    t.className = "typing";
    t.style.display = "none";
  }
  hideNetSearching();
}

function showNetSearching() {
  // 非 R1 模式下联网状态由 startNetFakeThinking 管理，不需要这里处理。
  // R1 模式下没有假思考块，才用 typing-subtitle 做降级显示。
  if (document.getElementById("think-block-el")) return;
  const sub = document.getElementById("typing-subtitle");
  if (!sub) return;
  sub.style.display = "block";
  sub.innerHTML = `<span style="color:var(--cold);font-family:'Share Tech Mono',monospace;font-size:12.5px;display:inline-flex;align-items:center;gap:0">
    <span class="net-search-dot"></span>正在联网搜索后室资料…
  </span>`;
  const feed = document.getElementById("feed");
  if (feed) feed.scrollTop = feed.scrollHeight;
}

function hideNetSearching() {
  // 联网状态由 stopNetFakeThinking 管理，这里只清 subtitle（R1 降级用）
  const sub = document.getElementById("typing-subtitle");
  if (!sub) return;
  sub.style.display = "none";
  sub.innerHTML = "";
}

// ════════════════════════════════════════════════════════
//  伊兹自检系统 (IZ WATCHDOG)
//
//  原理：processAction 运行期间，维护一个"活动心跳"时间戳 _wdLastBeat。
//  每次有可见进展（打字机产生字符、消息节点出现）时调用 watchdogBeat() 刷新它。
//  一个 4 秒检测 interval 持续监视：如果距上次心跳已超过 WATCHDOG_TIMEOUT ms，
//  就在 feed 里插入伊兹样式的自检提示块；心跳恢复时立刻移除。
//  processAction 的 finally 块负责彻底清理，保证不留残影。
// ════════════════════════════════════════════════════════
const WATCHDOG_TIMEOUT = 3500; // 3.5 秒无进展则触发（比原来快 0.5 秒）
let _wdLastBeat     = 0;       // 上次心跳时间戳
let _wdInterval     = null;    // 检测 interval id
let _wdBlockVisible = false;   // 自检块是否当前可见

function watchdogBeat() {
  // 刷新心跳时间戳，同时如果自检块正在显示，立刻隐藏它（进展已恢复）
  _wdLastBeat = Date.now();
  if (_wdBlockVisible) hideIzWatchdog();
}

function showIzWatchdog() {
  if (_wdBlockVisible) return;
  _wdBlockVisible = true;
  const feed = document.getElementById("feed");
  if (!feed) return;
  // 移除可能残留的旧块
  const old = document.getElementById("iz-watchdog-block");
  if (old) old.remove();

  const div = document.createElement("div");
  div.id = "iz-watchdog-block";
  // 轮流显示的等待提示文案，让它不单调
  const texts = [
    "伊兹构成中，请耐心等待…",
    "神经接入信号同步中…",
    "伊兹正在处理数据流…",
    "后室信号稍有延迟，伊兹仍在线…",
    "构建叙事矩阵，即将就绪…",
  ];
  let textIdx = 0;
  div.innerHTML = `<div class="iz-watchdog">
    <div class="iz-watchdog-hdr">
      <div class="iz-watchdog-av">伊</div>
      <div>
        <div class="iz-watchdog-nm">伊兹 · IZ <span style="color:var(--txt3);font-size:11px;font-family:'Share Tech Mono',monospace">自检中</span></div>
        <div class="iz-watchdog-tg">神经接入 · 仅主角可见</div>
      </div>
    </div>
    <div class="iz-watchdog-body">
      <div class="iz-wd-dots">
        <div class="iz-wd-dot"></div>
        <div class="iz-wd-dot"></div>
        <div class="iz-wd-dot"></div>
      </div>
      <span class="iz-watchdog-text" id="iz-wd-text">${texts[0]}</span>
    </div>
  </div>`;

  // 插到 typing-row 前面（和思考块、打字机节点保持同一区域）
  const typing = document.getElementById("typing-row");
  if (typing) feed.insertBefore(div, typing);
  else feed.appendChild(div);
  feed.scrollTop = feed.scrollHeight;

  // 每 2.8 秒轮换一条提示文案，让等待期不单调
  div._textTimer = setInterval(() => {
    const el = document.getElementById("iz-wd-text");
    if (!el) return;
    textIdx = (textIdx + 1) % texts.length;
    el.textContent = texts[textIdx];
  }, 2800);
}

function hideIzWatchdog() {
  _wdBlockVisible = false;
  const block = document.getElementById("iz-watchdog-block");
  if (!block) return;
  if (block._textTimer) clearInterval(block._textTimer);
  // 短暂淡出后移除，和 eraseThinkBlock 的视觉语言保持一致
  block.style.transition = "opacity 0.25s ease";
  block.style.opacity = "0";
  setTimeout(() => { block.remove(); }, 270);
}

function startWatchdog() {
  stopWatchdog(); // 防止重复启动
  _wdLastBeat = Date.now();
  _wdBlockVisible = false;
  _wdInterval = setInterval(() => {
    if (!processing) { stopWatchdog(); return; } // processAction 已结束，自动停止
    if (Date.now() - _wdLastBeat > WATCHDOG_TIMEOUT) {
      // 超时：显示自检块
      showIzWatchdog();
    }
  }, 1000); // 每秒检查一次
}

function stopWatchdog() {
  if (_wdInterval) { clearInterval(_wdInterval); _wdInterval = null; }
  hideIzWatchdog();
}

// ════════════════════════════════════════════════════════
//  PROCESS ACTION
// ════════════════════════════════════════════════════════
async function processAction(action) {
  if (processing) return;
  processing = true;
  _abortCtrl = new AbortController();
  renderOptions([]);
  document.getElementById("sbtn").disabled = true;
  showStopBtn(true);
  showTyping();
  trackInputFrequency(action);
  startWatchdog(); // ← 启动自检系统，开始监视进展心跳

  try {
    let searchRef = null;
    const t = getActive();
    resetDrawerQueue(); // 每轮开始清理上一轮残留的 queue（保留5条历史）

    const _isR1 = (DS_PRESET === "ds-r1") || DS_MODEL.includes("reasoner");

    // ── 两套假思考系统（仅非 R1 模型） ──
    // ── 假思考时序（仅非 R1 模型）──
    //
    //  阶段一：「伊兹神经网络加载」
    //    从发送行动立刻开始，贯穿 tavilySearch 等待和 callDS 流式输出全程。
    //    callDS 内部在第一个 content chunk 到来时触发删字动画（现有逻辑）。
    //
    //  阶段二：「对联网构想」
    //    addMessages 全部打完后才启动——此时 iz/narrator 都已呈现，
    //    但 updateWorldSummary（每5回合触发一次 API 调用）还在后台转，
    //    用联网假思考填充这段"空转"等待期，结束后停掉。

    if (!_isR1) {
      // 非 R1：立刻隐藏 typing-row，创建思考块，启动「伊兹神经网络加载」
      // 让玩家在发请求到第一个 chunk 之间完全没有空白等待期
      const _tr = document.getElementById("typing-row");
      if (_tr) _tr.style.display = "none";
      createThinkBlock();
      startFakeThinking(t.player?.name || t.charName, action);
    }
    // R1：思考块懒创建——callDS 内收到第一个 reasoning_content chunk 时才建，
    // 因为 R1 有真实推理内容，不需要假打字机占位

    // 第一轮（turn===0）不做联网搜索
    // tavilySearch 期间伊兹神经网络加载持续运行，不切换——联网是后台行为，不打断伊兹分析
    if (NET_ON && TVLY_KEY && t.turn > 0) {
      try {
        searchRef = await tavilySearch(`后室 backrooms ${t.player.currentLevel} ${action.substring(0,30)}`);
      } catch(_) {}
    }

    const resp = await callDS(action, searchRef);
    hideTyping();

    if (resp.stateUpdate) applyUpdate(resp.stateUpdate, resp);
    else applyUpdate(null, resp);

    if (resp.sessionLog && typeof resp.sessionLog === "string") {
      const t = getActive();
      t.progressLog  = t.progressLog  || [];
      t.progressMeta = t.progressMeta || [];
      const logTxt = resp.sessionLog.trim().substring(0,60);
      t.progressLog.push(logTxt);
      t.progressMeta.push({ izVerdict: "keep", userPin: false });
      // 进展动态入队
      queueDrawerItem({ dotType:"new", label:"进展日志", badge:"新增", badgeCls:"", text: logTxt });
      // 超出上限时，优先淘汰 purge 和 fade 的旧条目
      if (t.progressLog.length > 50) {
        const purgeIdx = t.progressMeta.findIndex(m => m.izVerdict === "purge" && !m.userPin);
        const fadeIdx  = t.progressMeta.findIndex(m => m.izVerdict === "fade"  && !m.userPin);
        const dropIdx  = purgeIdx !== -1 ? purgeIdx : fadeIdx !== -1 ? fadeIdx : 0;
        t.progressLog.splice(dropIdx, 1);
        t.progressMeta.splice(dropIdx, 1);
      }
      if (!resp.stateUpdate) saveAll();
    }

    // ── 事件记录 ──
    if (resp.eventLog && resp.eventLog.summary) {
      const t = getActive();
      t.eventLog = t.eventLog || [];
      const evSize = resp.eventLog.size || "small";
      const evSummary = (resp.eventLog.summary || "").substring(0, 60);
      t.eventLog.push({
        turn: t.turn,
        size: evSize,
        summary: evSummary,
        izVerdict: "keep",
        userPin: false
      });
      // 事件动态入队（小型事件也记录，便于玩家了解）
      const evDot  = evSize === "large" ? "event" : evSize === "mid" ? "event" : "new";
      const evBadge = { small:"小型", mid:"中型", large:"大型" }[evSize] || "小型";
      const evBadgeCls = evSize === "large" ? "fade" : "";
      queueDrawerItem({ dotType: evDot, label:"事件记录", badge: evBadge, badgeCls: evBadgeCls, text: evSummary });
      // 上限80条，超出时优先删 purge > fade > 最旧
      if (t.eventLog.length > 80) {
        const pi = t.eventLog.findIndex(e => e.izVerdict === "purge" && !e.userPin);
        const fi = t.eventLog.findIndex(e => e.izVerdict === "fade"  && !e.userPin);
        t.eventLog.splice(pi !== -1 ? pi : fi !== -1 ? fi : 0, 1);
      }
    }

    // ── 筛选外膜：处理 AI 下发的 memoryFilter 指令 ──
    // verdict 五级：boost(升到keep) / keep / fade / purge / delete(彻底清除)
    if (resp.memoryFilter && Array.isArray(resp.memoryFilter)) {
      const t = getActive();
      resp.memoryFilter.forEach(cmd => {
        const { target, turn: cmdTurn, verdict, reason } = cmd;
        if (!verdict || !["boost","keep","fade","purge","delete"].includes(verdict)) return;
        // 动态入队（伊兹主动调整，需要通知玩家）
        const vdBadgeMap = { boost:"↑抬升", keep:"维持", fade:"↓淡出", purge:"↓过时", delete:"✕删除" };
        const vdDotMap   = { boost:"boost", keep:"new", fade:"fade", purge:"purge", delete:"delete" };
        const vdBadgeCls = { boost:"boost", keep:"", fade:"fade", purge:"purge", delete:"delete" };
        const targetLbl  = { net:"舆论", progress:"进展", event:"事件" }[target] || target;
        queueDrawerItem({
          dotType:  vdDotMap[verdict]   || "new",
          label:    `伊兹·${targetLbl}`,
          badge:    vdBadgeMap[verdict] || verdict,
          badgeCls: vdBadgeCls[verdict] || "",
          text:     reason ? `T${cmdTurn}·${reason}` : `T${cmdTurn}条记忆已更新`
        });
        // 以下变量名避免与外层 turn 冲突
        const turn = cmdTurn;

        if (target === "net") {
          if (verdict === "delete") {
            // AI 请求彻底删除：只删除未被玩家固定的条目
            t.netMemory = (t.netMemory || []).filter(e => e.turn !== turn || e.userPin);
          } else {
            const entry = (t.netMemory || []).find(e => e.turn === turn);
            if (entry && !entry.userPin) {
              entry.izVerdict = verdict === "boost" ? "keep" : verdict;
            }
          }

        } else if (target === "progress") {
          const idx = (t.progressMeta || []).findIndex((_, i) => {
            const approxTurn = t.turn - ((t.progressLog||[]).length - 1 - i);
            return Math.abs(approxTurn - turn) <= 1;
          });
          if (idx !== -1 && !t.progressMeta[idx].userPin) {
            if (verdict === "delete") {
              t.progressLog.splice(idx, 1);
              t.progressMeta.splice(idx, 1);
            } else {
              t.progressMeta[idx].izVerdict = verdict === "boost" ? "keep" : verdict;
            }
          }

        } else if (target === "event") {
          if (verdict === "delete") {
            t.eventLog = (t.eventLog || []).filter(e => e.turn !== turn || e.userPin);
          } else {
            const ev = (t.eventLog || []).find(e => e.turn === turn);
            if (ev && !ev.userPin) {
              ev.izVerdict = verdict === "boost" ? "keep" : verdict;
            }
          }

        } else if (target === "npc") {
          // turn字段在NPC管理中存放NPC的id字符串
          const npcId = String(cmdTurn);
          const npc = (t.npcRoster || []).find(n => n.id === npcId || n.name === npcId);
          if (npc && !npc.userPin) {
            if (verdict === "delete") {
              // 永久删除 — 等同于 npcUpdate.action=remove
              t.npcRoster = t.npcRoster.filter(n => n.id !== npc.id);
            } else {
              npc.izVerdict = verdict === "boost" ? "keep" : verdict;
              // purge一个重要NPC → 自动降为普通（节省prompt token）
              if (verdict === "purge" && npc.important) {
                npc.important = false;
              }
            }
            // 推入情报动态抽屉（NPC变动需要通知玩家）
            const vdBadgeMap2 = { boost:"↑升至核心", keep:"维持", fade:"↓淡出", purge:"↓使命结束", delete:"✕离开" };
            const vdDotMap2   = { boost:"boost", keep:"new", fade:"fade", purge:"purge", delete:"delete" };
            const vdBadgeCls2 = { boost:"boost", keep:"", fade:"fade", purge:"purge", delete:"delete" };
            queueDrawerItem({
              dotType:  vdDotMap2[verdict]   || "new",
              label:    `伊兹·NPC`,
              badge:    vdBadgeMap2[verdict] || verdict,
              badgeCls: vdBadgeCls2[verdict] || "",
              text:     (npc.name || npcId) + (reason ? `·${reason}` : "")
            });
          }
        }
      });
      saveAll();
    }

    if (IMG_ON && resp.imagePrompt) {
      const imgResult = generateSceneImage(resp.imagePrompt);
      if (imgResult) {
        const imgId = Date.now().toString();
        if (imgResult.type === "poll") addMsgToFeed({ type:"scene-img", src: imgResult.url, imgId });
        else if (imgResult.type === "sf") { addMsgToFeed({ type:"scene-img", src:"", imgId }); fetchSFImage(imgId, imgResult.prompt, imgResult.seed); }
      }
    }

    // 所有数据处理完毕 → 弹出抽屉（仅本轮有动态时）
    flushDrawerIfNeeded();

    // addMessages 全部打字完成后才继续（包括 net/levelup 逐字打完）
    // 传入 _isR1 让 addMessages 内部决定何时启动/停止联网构想
    if (resp.messages?.length) await addMessages(resp.messages, _isR1);
    // addMessages 已经在内部处理了联网构想的启动与删除动画，
    // 这里只需确保残留的思考块被清理（极端容错，正常流程不会走到）
    if (!_isR1) {
      stopNetFakeThinking();
      const staleAfter = document.getElementById("think-block-el");
      if (staleAfter) await eraseThinkBlockFast();
    }

    // updateWorldSummary 每5回合触发一次后台 API，用「对联网构想」填充等待期
    // 在选项渲染之前执行，保证玩家看到的是"内容全部到位后"再出现行动选项
    const needsSummary = (t.turn % 5 === 0 && t.turn !== 0);
    if (!_isR1 && needsSummary) {
      // 创建全新思考块再启动，避免复用已被前一阶段清除的节点
      const staleForSummary = document.getElementById("think-block-el");
      if (staleForSummary) staleForSummary.remove();
      createThinkBlock();
      startNetFakeThinking(t.player?.currentLevel || "");
    }
    await updateWorldSummary();
    if (!_isR1 && needsSummary) {
      stopNetFakeThinking();
      await eraseThinkBlockFast();
    }

    // 选项在所有内容（含舆论/层级/worldSummary）全部渲染完后才显示
    if (resp.options) renderOptions(resp.options);

  } catch(err) {
    hideTyping();
    console.error(err);
    addMsgToFeed({ type:"error", content: err.message || "未知错误" }, false);
    renderOptions([{id:1,text:"重新尝试上一个行动",type:"normal"},{id:2,text:"【问伊兹】请报告当前状态",type:"iz"}]);
  } finally {
    // 无论成功、失败、中止，都彻底清理自检系统，保证不留残影
    stopWatchdog();
  }

  processing = false; _abortCtrl = null;
  document.getElementById("sbtn").disabled = false;
  showStopBtn(false);
}

function trackInputFrequency(text) {
  if (!text || text.startsWith("[") || text.length > 100) return;
  const t = getActive();
  if (!t.inputFrequency) t.inputFrequency = {};
  const key = text.trim().substring(0,80);
  t.inputFrequency[key] = (t.inputFrequency[key] || 0) + 1;
  if (t.inputFrequency[key] >= 2 && !t.quickActions.find(q => q.text === key)) {
    t.quickActions.push({ id: Date.now().toString(), text: key, pinned: false, freq: t.inputFrequency[key] });
    saveAll();
  }
}

  const prompt = promptEl.value.trim();
  if (!label) { nameEl.style.borderColor="#ff4a4a"; setTimeout(()=>nameEl.style.borderColor="",1000); return; }
  if (!prompt) { promptEl.style.borderColor="#ff4a4a"; setTimeout(()=>promptEl.style.borderColor="",1000); return; }

//  BACKNET 记忆面板控制器
// ════════════════════════════════════════════════════════
let _bnFilter = { tag: "全部", query: "" };

function bnRender() {
  const t = getActive();
  const nm = (t.netMemory || []).slice().reverse(); // 最新在上
  const { tag, query } = _bnFilter;

  const filtered = nm.filter(entry => {
    // 标签过滤
    if (tag === "重要") {
      if (entry.importance < 2) return false;
    } else if (tag !== "全部") {
      if (!(entry.tags || []).includes(tag)) return false;
    }
    // 搜索过滤（匹配 summary 或原始帖子内容）
    if (query) {
      const qLow = query.toLowerCase();
      const inSummary = (entry.summary || "").toLowerCase().includes(qLow);
      const inPosts = (entry.posts || []).some(p =>
        (p.content || "").toLowerCase().includes(qLow) ||
        (p.user || "").toLowerCase().includes(qLow)
      );
      if (!inSummary && !inPosts) return false;
    }
    return true;
  });

  const container = document.getElementById("bnm-list");
  if (!container) return;

  if (!filtered.length) {
    container.innerHTML = `<div class="bnm-empty">没有符合条件的舆论记录<br><span style="font-size:12px;color:var(--txt3)">尝试切换标签或清空搜索词</span></div>`;
    return;
  }

  const allVisibleSel = filtered.length > 0 && filtered.every(e => _bnSel.has(e.turn));
  const listHtml = filtered.map((entry, idx) => {
    const isSel = _bnSel.has(entry.turn);
    const impClass = entry.importance >= 3 ? "i3" : entry.importance === 2 ? "i2" : "i1";
    const entryClass = (entry.importance >= 3 ? "imp3" : entry.importance === 2 ? "imp2" : "") + (isSel ? " selected" : "");
    const tagChips = (entry.tags || []).map(tg => `<span class="bnm-chip">${esc(tg)}</span>`).join("");
    const postsHtml = (entry.posts || []).map(p => `
      <div class="net-post" style="font-size:12px;padding:7px 0;border-bottom:1px solid var(--bdr)">
        <div class="net-u" style="font-size:12px">【${esc(p.user||"匿名")}】</div>
        <div class="net-c" style="font-size:12.5px;line-height:1.7">${nl(p.content||"")}</div>
        ${(p.replies||[]).map(r=>`<div class="net-r" style="font-size:13px"><b style="color:var(--cold)">${esc(r.user||"")}：</b>${esc(r.content||"")}</div>`).join("")}
        ${p.time ? `<div class="net-t" style="font-size:12px">${esc(p.time)} · BackNet</div>` : ""}
      </div>`).join("");

    const vBadge = { keep:"vvb-keep", fade:"vvb-fade", purge:"vvb-purge" }[entry.izVerdict||"keep"] || "vvb-keep";
    const vLabel = { keep:"↑重要", fade:"→淡出", purge:"↓过时" }[entry.izVerdict||"keep"] || "↑重要";
    const curVerdict = entry.izVerdict || "keep";
    return `<div class="bnm-entry ${entryClass}" id="bne-${idx}" style="display:flex;align-items:flex-start;gap:8px;padding:2px 0">
      <input type="checkbox" class="sel-cb" style="margin:12px 0 0 10px;flex-shrink:0" ${isSel?'checked':''}
        onclick="bnToggleSel(${entry.turn})">
      <div style="flex:1;min-width:0">
        <div class="bnm-header" onclick="bnToggle(${idx})" style="padding:10px 12px 10px 0">
          <div class="bnm-imp ${impClass}"></div>
          <div class="bnm-meta">
            <div class="bnm-summary">${esc(entry.summary || "")}${entry.userPin ? '<span class="userpin-badge">📌</span>' : ''}</div>
            <div class="bnm-footer">
              <span class="bnm-turn">T${entry.turn}</span>
              ${tagChips}
              <span class="vd-verdict-badge ${vBadge}">${vLabel}</span>
            </div>
          </div>
          <span class="bnm-expand">展开</span>
        </div>
        <div class="bnm-raw" id="bnr-${idx}">
          <div style="color:var(--txt3);font-size:12px;font-family:'Share Tech Mono',monospace;margin-bottom:6px">回合 ${entry.turn} · 原始帖子</div>
          ${postsHtml || "<div style='color:var(--txt3);font-size:13px'>无原始数据</div>"}
          <div style="display:flex;gap:6px;margin-top:8px;padding-top:8px;border-top:1px solid var(--bdr)">
            <button class="vd-btn vd-btn-pin ${entry.userPin?'pinned':''}"
              onclick="bnPinToggle(${entry.turn})" style="font-size:12px">
              ${entry.userPin ? '📌已固定' : '固定'}
            </button>
            ${!entry.userPin ? `
            <button class="vd-btn" style="background:rgba(100,100,180,0.1);border:1px solid rgba(100,100,180,0.25);color:#8888cc;font-size:11px"
              onclick="bnSetVerdict(${entry.turn}, '${curVerdict==='keep'?'fade':curVerdict==='fade'?'purge':'keep'}')">
              ${curVerdict==='keep'?'降级':'升级'}
            </button>` : ''}
          </div>
        </div>
      </div>
    </div>`;
  }).join("");

  const fabBn = _bnSel.size > 0 ? `
    <div class="float-action-bar">
      <span class="fab-count">已选 ${_bnSel.size} 条</span>
      <button class="fab-cancel-btn" onclick="_bnSel.clear();bnRender()">取消</button>
      <button class="fab-del-btn" onclick="bnDeleteSelected()">🗑 永久删除</button>
    </div>` : '';

  container.innerHTML = `
    <div class="sel-row">
      <input type="checkbox" class="sel-cb" ${allVisibleSel?'checked':''} onclick="bnSelAll()">
      <span class="sel-count">${(getActive().netMemory||[]).length} 条舆论 · 点击复选框多选</span>
      <button class="sel-all-btn" onclick="bnSelAll()">${allVisibleSel?'取消全选':'全选'}</button>
    </div>
    <div id="bnm-inner-list">${listHtml}</div>
    ${fabBn}`;
}

function bnToggle(idx) {
  const entry = document.getElementById("bne-" + idx);
  const raw   = document.getElementById("bnr-" + idx);
  const btn   = entry ? entry.querySelector(".bnm-expand") : null;
  if (!entry || !raw) return;
  const isOpen = raw.classList.toggle("open");
  entry.classList.toggle("expanded", isOpen);
  if (btn) btn.textContent = isOpen ? "收起" : "展开";
}

function bnSetTag(tag) {
  _bnFilter.tag = tag;
  // 更新 chip 高亮
  document.querySelectorAll(".bnm-tag").forEach(el => {
    el.classList.toggle("active", el.dataset.tag === tag);
  });
  bnRender();
}

function bnSearch(val) {
  _bnFilter.query = val.trim();
  bnRender();
}


// ════════════════════════════════════════════════════════
//  情报系统：进展日志操作
// ════════════════════════════════════════════════════════
// ════════════════════════════════════════════════════════
//  通用：删除确认弹窗
// ════════════════════════════════════════════════════════
// ════════════════════════════════════════════════════════
//  情报动态悬浮抽屉
//
//  两种状态：
//    · open  — 玩家手动点拨片，完整面板全部展开，永久保持直到手动收起
//    · peek  — 游戏自动推送，从拨片处弹出紧凑情报条，5秒后淡出消失
//
//  NEW 徽章：
//    · 每条新入队的条目携带 isNew 标记
//    · 完整面板中新条目强制排在最上面（按 importance 降序）
//    · NEW 字符 6s 循环 红→黄→绿→蓝→消失
//
//  拨片颜色：
//    · 有新信息时变红并脉冲，peek 消失后 3.5s 渐变过渡回原紫色
// ════════════════════════════════════════════════════════

// 动态队列：每条 { dotType, label, badge, badgeCls, text, importance, isNew, newBornAt }
let _drawerQueue   = [];
// 记录本轮 flush 新增的条目 id（用于 peek 面板渲染）
let _peekItems     = [];

// peek 自动消失计时器
let _peekFadeTimer  = null;
let _peekHideTimer  = null;
// 拨片颜色恢复计时器
let _tabFadeTimer   = null;

// importance 权重：决定完整面板排序（越高越靠前）
const _IMP = { purge:4, delete:4, boost:3, event:3, new:2, net:2, fade:1 };

function _drawerEl()    { return document.getElementById("intel-drawer"); }
function _drawerTabEl() { return document.getElementById("intel-drawer-tab"); }
function _peekBodyEl()  { return document.getElementById("intel-peek-body"); }

// ── 手动开/关（点拨片） ──────────────────────────────────────
function toggleIntelDrawer() {
  const el = _drawerEl();
  if (!el) return;
  if (el.classList.contains("open")) {
    hideIntelDrawer();
  } else {
    // 手动打开：先把 peek 状态彻底清掉，再展开完整面板
    _cancelPeek();
    _openDrawer();
  }
}

function hideIntelDrawer() {
  _cancelPeek();
  const el = _drawerEl();
  if (!el) return;
  el.classList.remove("open", "peek", "peek-fading");
  el.style.opacity      = "";
  el.style.pointerEvents = "";
  el.style.width        = "";
  el.style.transition   = "";
  // 清掉拨片提示（手动关闭视为已读）
  const tab = _drawerTabEl();
  if (tab) tab.classList.remove("has-update", "has-unread", "fading-unread");
  if (_tabFadeTimer) { clearTimeout(_tabFadeTimer); _tabFadeTimer = null; }
  // 吉祥物切回探头模式，法阵隐藏
  const msc = document.getElementById("iz-mascot");
  if (msc) msc.classList.remove("open-mode");
  const sg = document.getElementById("idr-sigil-wrap");
  if (sg) sg.classList.remove("visible");
}

// ── 全局点击消除：点任意区域让弹窗和本体都渐变消失 ─────────────
function _initGlobalDismiss() {
  document.addEventListener('pointerdown', (e) => {
    const el = _drawerEl();
    if (!el) return;
    const isOpen = el.classList.contains('open');
    const isPeek = el.classList.contains('peek') || el.classList.contains('peek-fading');
    if (!isOpen && !isPeek) return;

    // 点击在抽屉内部或拨片上，不处理
    const tab = _drawerTabEl();
    if (el.contains(e.target) || (tab && tab.contains(e.target))) return;

    // 点外部：统一收回抽屉（slide out），不触发任何 peek
    _cancelPeek();
    _peekItems = [];
    hideIntelDrawer();
  }, { passive: true });
}

// 在 DOM 就绪后初始化
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', _initGlobalDismiss);
} else {
  _initGlobalDismiss();
}

function _openDrawer() {
  const el = _drawerEl();
  if (!el) return;
  renderIntelDrawer();          // 重建完整面板内容
  el.classList.remove("peek", "peek-fading");
  el.style.opacity   = "1";
  el.style.pointerEvents = "auto";
  el.style.width     = "";      // 恢复完整宽度（由 .open CSS 控制）
  el.style.transition = "";
  el.classList.add("open");
  // 吉祥物切换到站立张望模式，法阵显示
  const msc = document.getElementById("iz-mascot");
  if (msc) msc.classList.add("open-mode");
  const sg = document.getElementById("idr-sigil-wrap");
  if (sg) sg.classList.add("visible");
}

// ── peek 模式 ────────────────────────────────────────────────
function _showPeek() {
  const el = _drawerEl();
  if (!el) return;
  if (el.classList.contains("open")) return; // 完整面板已开，不干扰

  _cancelPeek();

  // 渲染 peek 内容（仅本轮新增条目）
  _renderPeekItems();

  el.classList.remove("peek-fading");
  el.style.opacity    = "1";
  el.style.transition = "transform 0.32s cubic-bezier(0.4,0,0.2,1), opacity 0.3s ease";
  el.classList.add("peek");

  // 5 秒后开始淡出
  _peekFadeTimer = setTimeout(() => {
    const el2 = _drawerEl();
    if (!el2 || !el2.classList.contains("peek")) return;
    el2.classList.add("peek-fading");
    // 等淡出动画（1.8s）完成后彻底收起
    _peekHideTimer = setTimeout(() => _closePeek(), 1900);
  }, 5000);
}

function _closePeek() {
  const el = _drawerEl();
  if (!el) return;
  // 先锁定 transform 为屏幕外，防止移除 class 时出现一帧闪烁
  el.style.transform  = "translateX(100%)";
  el.style.opacity    = "0";
  el.style.pointerEvents = "none";
  el.classList.remove("peek", "peek-fading");
  // 下一帧再清掉 inline style，让 CSS 接管（此时已无任何 class，元素不可见）
  requestAnimationFrame(() => {
    el.style.transform  = "";
    el.style.opacity    = "";
    el.style.transition = "";
    el.style.pointerEvents = "";
  });
  // 拨片颜色：开始渐变回原色（有未读但已消失的状态）
  const tab = _drawerTabEl();
  if (tab) {
    tab.classList.remove("has-unread");
    tab.classList.add("fading-unread");
    // 3.5s 过渡动画完成后恢复原始样式
    if (_tabFadeTimer) clearTimeout(_tabFadeTimer);
    _tabFadeTimer = setTimeout(() => {
      tab.classList.remove("fading-unread");
    }, 3500);
  }
}

function _cancelPeek() {
  if (_peekFadeTimer)  { clearTimeout(_peekFadeTimer);  _peekFadeTimer  = null; }
  if (_peekHideTimer)  { clearTimeout(_peekHideTimer);  _peekHideTimer  = null; }
  const el = _drawerEl();
  if (el) {
    el.classList.remove("peek", "peek-fading");
    el.style.opacity = "";
    el.style.transition = "";
  }
}

// ── 内容渲染 ──────────────────────────────────────────────────

// 生成单条条目 HTML（showNew=true 时才显示 NEW 徽章）
function _entryHTML(item, showNew) {
  const newBadge = (showNew && item.isNew)
    ? `<span class="idr-new-badge">NEW</span>` : '';
  return `<div class="idr-entry">
    <div class="idr-dot idr-dot-${item.dotType || 'new'}"></div>
    <div class="idr-meta">
      <div class="idr-label">
        <span>${item.label}</span>
        ${item.badge ? `<span class="idr-label-badge ${item.badgeCls || ''}">${item.badge}</span>` : ''}
        ${newBadge}
      </div>
      <div class="idr-text">${esc(item.text)}</div>
    </div>
  </div>`;
}

// 给容器内所有 NEW 徽章挂 animationend：播完后把元素从 DOM 删掉
function _wireNewBadges(container) {
  if (!container) return;
  container.querySelectorAll('.idr-new-badge').forEach(el => {
    // 只挂一次（避免重复渲染重复挂）
    if (el._wired) return;
    el._wired = true;
    el.addEventListener('animationend', () => el.remove(), { once: true });
  });
}

// 完整面板：isNew 条目按 importance 降序置顶，旧条目随后
function renderIntelDrawer() {
  const body = document.getElementById("intel-drawer-body");
  if (!body) return;
  if (!_drawerQueue.length) {
    body.innerHTML = `<div class="idr-empty">暂无情报动态<br>等待剧情推进…</div>`;
    return;
  }
  const newItems = _drawerQueue
    .filter(i => i.isNew)
    .sort((a,b) => ((_IMP[b.dotType]||0) - (_IMP[a.dotType]||0)));
  const oldItems = _drawerQueue.filter(i => !i.isNew);
  body.innerHTML = [...newItems, ...oldItems]
    .map(item => _entryHTML(item, true))
    .join("");
  _wireNewBadges(body);   // 注册动画结束后自动删除
}

// peek 面板：只渲染本轮 _peekItems，按 importance 降序
function _renderPeekItems() {
  const body = _peekBodyEl();
  if (!body) return;
  const sorted = [..._peekItems].sort((a,b) => ((_IMP[b.dotType]||0) - (_IMP[a.dotType]||0)));
  // peek 里不显示 NEW 徽章（已足够显眼，避免视觉过载）
  body.innerHTML = sorted.map(item => _entryHTML(item, false)).join("");
}

// ── 由游戏主流程调用：累积本轮动态 ──────────────────────────
function queueDrawerItem(item) {
  // 打上新鲜标记和时间戳
  item.isNew     = true;
  item.newBornAt = Date.now();
  _drawerQueue.unshift(item);   // 最新在队首（完整面板用）
  _peekItems.push(item);        // 本轮 peek 备用
  if (_drawerQueue.length > 30) _drawerQueue.pop();
}

// processAction 结束后调用：弹出 peek 条并激活拨片提示
function flushDrawerIfNeeded() {
  if (!_peekItems.length) return;

  // 拨片变红提示
  const tab = _drawerTabEl();
  if (tab) {
    tab.classList.remove("fading-unread");
    tab.classList.add("has-update", "has-unread");
  }

  // 若完整面板已经是 open 状态，刷新内容即可，不重新弹 peek
  const el = _drawerEl();
  if (el && el.classList.contains("open")) {
    renderIntelDrawer();
    return;
  }

  // 弹出 peek 条
  _showPeek();
}

// 玩家手动操作（pin/purge/delete）时静默刷新，不触发弹出
function refreshDrawerSilent() {
  renderIntelDrawer();
}

// 每回合结束后：把上一轮的 isNew 旧化，清空 peek 缓冲
function resetDrawerQueue() {
  // 超过 5 条历史的部分截断
  _drawerQueue = _drawerQueue.slice(0, 30);
  // 上一轮的 NEW 标记在下一轮失效
  _drawerQueue.forEach(i => { i.isNew = false; });
  _peekItems = [];
}

function showDeleteConfirm(count, onConfirm) {
  const overlay = document.createElement("div");
  overlay.className = "del-confirm-overlay";
  overlay.id = "del-confirm-overlay";
  overlay.innerHTML = `
    <div class="del-confirm-box">
      <div class="del-confirm-icon">⚠️</div>
      <div class="del-confirm-title">确认永久删除</div>
      <div class="del-confirm-body">即将删除 <b style="color:var(--danger)">${count}</b> 条记忆信息</div>
      <div class="del-confirm-warning">⚠ 一旦删除，伊兹将永远不再回忆这些内容<br>这些信息将从存档和存储中彻底消失</div>
      <div class="del-confirm-btns">
        <button class="del-confirm-cancel" onclick="document.getElementById('del-confirm-overlay').remove()">取消</button>
        <button class="del-confirm-ok" id="del-confirm-ok-btn">确认删除</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
  document.getElementById("del-confirm-ok-btn").onclick = () => {
    overlay.remove();

}

function switchIntelTab(tab) {

function renderIntelTab(tab) {
  const body = document.getElementById("intel-tab-body");
  if (!body) return;
  const t = getActive();
  // 切换 tab 时清空上一个 tab 的选中状态，防止跨 tab 误操作
  _progressSel.clear();
  _eventSel.clear();
  _bnSel.clear();

  if (tab === "progress") {
    const total = (t.progressLog || []).length;
    const purged = (t.progressMeta || []).filter(m => m.izVerdict === "purge").length;
    body.innerHTML = `
      <div style="color:var(--txt3);font-size:12px;font-family:'Share Tech Mono',monospace;margin-bottom:12px">
        共 ${total} 条 · <span style="color:var(--danger)">${purged} 条被伊兹标记过时</span> · 最新在上
      </div>
      <div id="progress-panel-body"></div>`;
    renderProgressPanel();

  } else if (tab === "event") {
    const total = (t.eventLog || []).length;
    const large = (t.eventLog || []).filter(e => e.size === "large").length;
    body.innerHTML = `
      <div style="display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap">
        ${[["全部","全部"],["large","大型"],["mid","中型"],["pin","已固定"]].map(([f,l]) =>
          `<div class="bnm-tag ev-filter-btn ${_evFilter===f?'active':''}" data-f="${f}"
            onclick="evSetFilter('${f}')">${l}</div>`
        ).join("")}
        <div style="margin-left:auto;color:var(--txt3);font-size:12px;font-family:'Share Tech Mono',monospace;line-height:28px">共${total}条·★${large}大型</div>
      </div>
      <div id="event-panel-body"></div>`;
    renderEventPanel();

  } else if (tab === "backnet") {
    _bnFilter = { tag: "全部", query: "" };
    const nm = t.netMemory || [];
    const totalHi = nm.filter(e => e.importance >= 2).length;
    body.innerHTML = `
      <input class="bnm-search" placeholder="搜索帖子内容、发帖人…"
        oninput="bnSearch(this.value)" autocomplete="off" spellcheck="false">
      <div class="bnm-tags">
        ${[["全部",nm.length],["重要",totalHi],["委托",null],["威胁",null],["线索",null],["组织",null],["奇怪",null],["情报",null]].map(([tag,cnt]) =>
          `<div class="bnm-tag ${tag==='重要'?'imp3':''} ${_bnFilter.tag===tag?'active':''}"
            data-tag="${tag}" onclick="bnSetTag('${tag}')">${tag}${cnt!==null?' '+cnt:''}</div>`
        ).join("")}
      </div>
      <div style="color:var(--txt3);font-size:12px;font-family:'Share Tech Mono',monospace;margin-bottom:10px">
        共 ${nm.length} 条 · ${totalHi} 条重要 · 点击展开原始帖子 · 可固定或标记过时
      </div>
      <div id="bnm-list"></div>`;
    bnRender();

  } else if (tab === "topics") {
    body.innerHTML = buildTopicsPanelBody();
    wireTopicsPanel();

  } else if (tab === "npc") {
    renderIntelNpcTab(body);
  }
}

function renderIntelNpcTab(body) {
  const t = getActive();
  const npcs = t.npcRoster || [];
  if (!npcs.length) {
    body.innerHTML = `<div style="color:var(--txt2);font-size:13px;padding:24px;text-align:center;line-height:2">
      暂无NPC记录<br><span style="color:var(--txt3);font-size:12px">AI会在关键角色出现时自动记录</span></div>`;
    return;
  }
  const relLabel = {friendly:"友善",hostile:"敌对",neutral:"中立",complex:"复杂"};
  const relColor = {friendly:"var(--green)",hostile:"var(--danger)",neutral:"var(--txt2)",complex:"var(--purple)"};
  const html = npcs.map((n, origIdx) => {
    const rel = relLabel[n.relation] || "中立";
    const rc  = relColor[n.relation]  || "var(--txt2)";
    const imp = n.important ? '<span style="color:var(--gold);font-size:11px;margin-left:4px">★核心</span>' : '';
    // iz verdict badge
    const vBadge = { keep:"vvb-keep", fade:"vvb-fade", purge:"vvb-purge" }[n.izVerdict||"keep"] || "vvb-keep";
    const vLabel = { keep:"↑活跃", fade:"→淡出", purge:"↓过时" }[n.izVerdict||"keep"] || "↑活跃";
    return `<div class="npc-card" id="intel-npc-${origIdx}" style="margin-bottom:10px;border:1px solid var(--bdr);border-radius:11px;padding:12px 13px;background:var(--bg2);${n.userPin?'border-color:rgba(232,184,64,0.4)':''}">
      <div style="display:flex;align-items:flex-start;gap:8px;margin-bottom:6px">
        <div style="flex:1;min-width:0">
          <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
            <span class="npc-name" style="font-size:14px">${esc(n.name)}</span>
            <span class="npc-rel ${n.relation}" style="font-size:11px">${rel}</span>
            ${imp}
            ${n.userPin ? '<span class="userpin-badge">📌</span>' : ''}
            <span class="vd-verdict-badge ${vBadge}" style="margin-left:auto">${vLabel}</span>
          </div>
          <div class="npc-desc" style="font-size:12.5px;margin-top:5px">${esc(n.desc)}</div>
          ${n.lastSeen ? `<div style="color:var(--txt3);font-size:11.5px;margin-top:4px;font-family:'Share Tech Mono',monospace">最后出现：${esc(n.lastSeen)}</div>` : ''}
        </div>
      </div>
      <div style="display:flex;gap:6px;margin-top:8px;padding-top:8px;border-top:1px solid var(--bdr)">
        <button class="vd-btn vd-btn-pin ${n.userPin?'pinned':''}"
          onclick="intelNpcPin(${origIdx})" style="font-size:11px">
          ${n.userPin ? '📌已固定' : '固定'}
        </button>
        <button class="vd-btn" style="font-size:11px;background:rgba(155,107,255,0.08);border:1px solid rgba(155,107,255,0.25);color:var(--purple)"
          onclick="intelNpcToggleImportant(${origIdx})">
          ${n.important ? '降为普通' : '标为核心'}
        </button>
        ${!n.userPin ? `<button class="vd-btn" style="background:rgba(100,100,180,0.1);border:1px solid rgba(100,100,180,0.25);color:#9898cc;font-size:11px"
          onclick="intelNpcSetVerdict(${origIdx}, '${(n.izVerdict||'keep')==='keep'?'fade':(n.izVerdict||'keep')==='fade'?'purge':'keep'}')">
          ${(n.izVerdict||'keep')==='keep'?'降级':'升级'}</button>` : ''}
      </div>
    </div>`;
  }).join('');
  body.innerHTML = `
    <div style="color:var(--txt2);font-size:12px;font-family:'Share Tech Mono',monospace;margin-bottom:12px">
      共 ${npcs.length} 个NPC · ★${npcs.filter(n=>n.important).length}核心 · 点击操作管理
    </div>
    ${html}`;
}

function intelNpcPin(idx) {
  const t = getActive();
  if (!t.npcRoster[idx]) return;
  t.npcRoster[idx].userPin = !t.npcRoster[idx].userPin;
  if (t.npcRoster[idx].userPin) t.npcRoster[idx].izVerdict = "keep";
  saveAll();
  const body = document.getElementById("intel-tab-body");
  if (body) renderIntelNpcTab(body);
}
function intelNpcToggleImportant(idx) {
  const t = getActive();
  if (!t.npcRoster[idx]) return;
  t.npcRoster[idx].important = !t.npcRoster[idx].important;
  saveAll();
  const body = document.getElementById("intel-tab-body");
  if (body) renderIntelNpcTab(body);
}
function intelNpcSetVerdict(idx, v) {
  const t = getActive();
  if (!t.npcRoster[idx] || t.npcRoster[idx].userPin) return;
  t.npcRoster[idx].izVerdict = v;
  saveAll();
  const body = document.getElementById("intel-tab-body");
  if (body) renderIntelNpcTab(body);
}

function openSlidePanel(type) {
  const container = document.getElementById("panel-container");
  const t = getActive();
  const p = t.player;
  let html = "";

  if (type === "backpack") {
    html = `<div class="panel-bg" onclick="closePanels()"></div><div class="panel">

    if (!t.inventory.length) html += `<div style="color:var(--txt2);text-align:center;padding:30px;font-size:13px">背包是空的</div>`;
    else t.inventory.forEach(i => {
      html += `<div class="item-card"><div class="item-n">${esc(i.name)}<span class="item-q">x${i.qty}</span></div><div class="item-d">${esc(i.desc)}</div></div>`;
    });
    html += `</div></div>`;
  }
  else if (type === "status") {
    html = `<div class="panel-bg" onclick="closePanels()"></div><div class="panel">
      <div class="ph"><div class="pt">◈ 详细状态</div><button class="pclose" onclick="closePanels()">✕</button></div>
      <div class="pb">
