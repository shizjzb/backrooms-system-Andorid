async function fetchBalance() {
  const amountEl = document.getElementById("balance-amount");
  const subEl    = document.getElementById("balance-sub");
  if (!amountEl) return;
  amountEl.textContent = "查询中…";
  subEl.textContent = "";
  if (!API_KEY || !API_KEY.startsWith("sk-")) {
    amountEl.textContent = "—"; subEl.textContent = "需要有效的 DeepSeek Key"; return;
  }
  if (DS_API !== "https://api.deepseek.com/chat/completions" && DS_PRESET !== "ds-v3" && DS_PRESET !== "ds-r1") {
    amountEl.textContent = "—"; subEl.textContent = "非 DeepSeek 端点，不支持查询"; return;
  }
  try {
    const res = await fetch(DS_BALANCE_API, { headers: { "Authorization": "Bearer " + API_KEY } });
    if (!res.ok) throw new Error("HTTP " + res.status);
    const data = await res.json();
    const balance = data.balance_infos?.find(b => b.currency === "CNY");
    if (balance) {
      const avail = parseFloat(balance.available_balance);
      const total = parseFloat(balance.total_balance);
      amountEl.textContent = "¥" + (isNaN(avail) ? "—" : avail.toFixed(2));
      subEl.textContent = "总余额: ¥" + (isNaN(total) ? "—" : total.toFixed(2));
    } else { amountEl.textContent = "—"; subEl.textContent = "返回数据异常"; }
  } catch(e) { amountEl.textContent = "—"; subEl.textContent = "查询失败：" + e.message; }
}

function refreshExportInfo() {

  const infoEl = document.getElementById("export-info");

  const tp = getTopic(sel.value);
  if (!tp) return;

}

function doExportAdvanced() {
  const tidEl   = document.getElementById("export-tid");
  const fromEl  = document.getElementById("export-from");
  const toEl    = document.getElementById("export-to");
  const expNarr = document.getElementById("exp-narrator")?.checked ?? true;
  const expDlg  = document.getElementById("exp-dialog")?.checked ?? true;
  const expNet  = document.getElementById("exp-net")?.checked ?? true;
  const expDev  = document.getElementById("exp-devour")?.checked ?? true;
  const expSys  = document.getElementById("exp-system")?.checked ?? false;

  const tid  = tidEl?.value || ACTIVE_TOPIC_ID;
  const tp   = getTopic(tid);
  if (!tp) { alert("找不到旅程数据"); return; }

  const fromTurn = parseInt(fromEl?.value ?? 0) || 0;
  const toTurn   = parseInt(toEl?.value   ?? tp.turn) || tp.turn;

  // We track turn via progressLog length as a proxy — renderedMessages don't have turn stamps
  // so we do a best-effort slice: estimate messages per turn ratio
  const msgs = tp.renderedMessages || [];
  const totalTurns = tp.turn || 1;
  const msgsPerTurn = msgs.length / totalTurns;
  const startIdx = Math.max(0, Math.floor(fromTurn * msgsPerTurn));
  const endIdx   = Math.min(msgs.length, Math.ceil(toTurn * msgsPerTurn));
  const slice    = msgs.slice(startIdx, endIdx);

  const lines = [
    `后室文字冒险 · ${tp.charName||tp.player.name} 的旅程`,
    `导出时间：${new Date().toLocaleString("zh-CN")}`,
    `旅程名：${tp.name}`,
    `导出范围：回合 ${fromTurn} — ${toTurn}（共 ${slice.length} 条记录）`,
    "═".repeat(50), ""
  ];

  slice.forEach(m => {
    if (!m) return;
    let prefix = "", content = "";
    switch(m.type) {
      case "narrator": if (!expNarr) return; prefix="【叙事者】"; content=m.content||""; break;
      case "iz":       if (!expNarr) return; prefix="【伊兹】";   content=m.content||""; break;
      case "dialog":   if (!expDlg)  return; prefix=`【${m.speaker||"NPC"}】`; content=`"${m.content||""}"`; break;
      case "net":      if (!expNet)  return; prefix="【BackNet】"; content=(m.posts||[]).map(p=>`@${p.user}：${p.content}${(p.replies||[]).map(r=>"\n  └ @"+r.user+"："+r.content).join("")}`).join("\n"); break;
      case "devour":   if (!expDev)  return; prefix="【暴食系统】"; content=`目标：${m.target||""}\n${m.description||""}\n获得：${m.gained||""}`; break;
      case "system":   if (!expSys)  return; prefix="【系统】"; content=m.content||""; break;
      case "levelup":  if (!expDev)  return; prefix="【升级】"; content=m.content||""; break;
      default: return;
    }
    if (content.trim()) lines.push(prefix + "\n" + content + "\n");
  });

  // Append progress log for the range as reference
  if (tp.progressLog?.length) {
    lines.push("═".repeat(50));
    lines.push("【进展日志摘要】");
    const logSlice = tp.progressLog.slice(Math.max(0,fromTurn-1), toTurn);
    logSlice.forEach((e,i) => lines.push(`T${fromTurn+i}：${e}`));
  }

  const blob = new Blob([lines.join("\n")], { type:"text/plain;charset=utf-8" });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement("a");
  const safeName = `${tp.charName||"主角"}_T${fromTurn}-${toTurn}_${tp.name}`.replace(/[/\\?%*:|"<>]/g,"_");
  a.href = url; a.download = `后室_${safeName}.txt`;
  a.click();
  URL.revokeObjectURL(url);
}

// Keep backward-compat alias
function doExport() { doExportAdvanced(); }

// ─── STORAGE MONITOR ────────────────────────────────────
function refreshStorageInfo() {
  const el = document.getElementById("storage-info");
  if (!el) return;

  // Calculate raw localStorage usage
  let totalBytes = 0;
  let gameBytes  = 0;
  try {
    for (let i = 0; i < localStorage.length; i++) {
      const k = localStorage.key(i);
      const v = localStorage.getItem(k) || "";
      const bytes = (k.length + v.length) * 2; // UTF-16 approx
      totalBytes += bytes;
      if (k === STORAGE_KEY) gameBytes = bytes;
    }
  } catch(e) {}

  const fmt = b => b > 1048576 ? (b/1048576).toFixed(2)+" MB" : b > 1024 ? (b/1024).toFixed(1)+" KB" : b+" B";
  // Most browsers allow ~5-10 MB localStorage
  const quota = 5 * 1024 * 1024; // conservative 5 MB estimate
  const pct   = Math.min(100, Math.round(totalBytes / quota * 100));
  const gameTopics = TOPICS.map(tp => {
    const raw = JSON.stringify(tp);
    const b   = raw.length * 2;
    return `<div style="display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px solid var(--bdr)">
      <span style="color:var(--txt2);font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1">${esc(tp.charName||tp.player.name)} — ${esc(tp.name)}</span>
      <span style="color:${b>500000?'var(--danger)':b>200000?'var(--orange)':'var(--txt3)'};font-family:'Share Tech Mono',monospace;font-size:12px;flex-shrink:0;margin-left:8px">${fmt(b)}</span>
    </div>`;
  }).join("");

  const barColor = pct > 85 ? "var(--danger)" : pct > 60 ? "var(--orange)" : "var(--green)";
  el.innerHTML = `
    <div style="margin-bottom:8px">
      <div style="display:flex;justify-content:space-between;margin-bottom:4px">
        <span style="color:var(--txt2);font-size:13px;font-family:'Share Tech Mono',monospace">localStorage 使用率</span>
        <span style="color:${barColor};font-family:'Share Tech Mono',monospace;font-size:13px">${pct}% · ${fmt(totalBytes)} / ~5MB</span>
      </div>
      <div style="height:6px;background:var(--bg0);border-radius:3px;overflow:hidden">
        <div style="height:100%;width:${pct}%;background:${barColor};border-radius:3px;transition:width 0.4s"></div>
      </div>
      ${pct > 80 ? `<div style="color:var(--danger);font-size:12.5px;margin-top:5px;font-family:'Share Tech Mono',monospace">⚠ 存储接近上限，建议导出后精简历史消息</div>` : ''}
    </div>
    <div style="color:var(--txt3);font-size:12px;font-family:'Share Tech Mono',monospace;margin-bottom:5px">游戏数据占用：${fmt(gameBytes)}</div>
    <div style="color:var(--txt3);font-size:12px;font-family:'Share Tech Mono',monospace;margin-bottom:5px">各旅程占用：</div>
    ${gameTopics}

function pruneOldMessages() {

  TOPICS.forEach(tp => {

      tp.renderedMessages = tp.renderedMessages.slice(-60);
    if (tp.convoHistory && tp.convoHistory.length > 40)
      tp.convoHistory = tp.convoHistory.slice(-40);

  const q = t.quickActions.find(q => q.id === id);
  if (q) { q.pinned = !q.pinned; saveAll(); closePanels(); openSlidePanel("quickactions"); }

  t.quickActions = t.quickActions.filter(q => q.id !== id);

function addQA() {

    closePanels();

function renderModelChips(containerId, customBlockId, urlInputId, modelInputId, activePreset, onSelect) {
  const container   = document.getElementById(containerId);
  const customBlock = document.getElementById(customBlockId);
  const urlInput    = document.getElementById(urlInputId);
  const modelInput  = document.getElementById(modelInputId);
  if (!container) return;
  container.innerHTML = "";
  MODEL_PRESETS.forEach(preset => {
    const chip = document.createElement("div");
    chip.className = "model-chip" + (preset.id === activePreset ? " active-chip" : "");
    chip.textContent = preset.label;
    const doSelect = () => selectChip(preset);
    chip.addEventListener("touchend", _safeTouchToggle(doSelect), {passive:false});
    chip.addEventListener("click", doSelect);
    container.appendChild(chip);
  });
  if (activePreset === "custom" && urlInput && modelInput) {
    if (!urlInput.value)   urlInput.value   = DS_API   || "";
    if (!modelInput.value) modelInput.value = DS_MODEL || "";
    if (customBlock) customBlock.classList.add("open");
  }
  function selectChip(preset) {
    container.querySelectorAll(".model-chip").forEach(c => c.classList.remove("active-chip"));
    const clicked = [...container.querySelectorAll(".model-chip")].find(c => c.textContent === preset.label);
    if (clicked) clicked.classList.add("active-chip");
    if (customBlock) {
      if (preset.id === "custom") {
        customBlock.classList.add("open");
      } else {
        customBlock.classList.remove("open");
        if (urlInput)   urlInput.value   = preset.endpoint;
        if (modelInput) modelInput.value = preset.model;
      }
    }
    if (onSelect) onSelect(preset);
  }
}

function resolveModelConfig(presetId, urlInputId, modelInputId) {
  if (presetId === "custom") {
    const url   = (document.getElementById(urlInputId)?.value||"").trim();
    const model = (document.getElementById(modelInputId)?.value||"").trim();
    return { endpoint: url||"https://api.deepseek.com/chat/completions", model: model||"deepseek-chat", presetId:"custom" };
  }
  const preset = MODEL_PRESETS.find(p=>p.id===presetId)||MODEL_PRESETS[0];
  return { endpoint:preset.endpoint, model:preset.model, presetId:preset.id };
}

let _searchMatches=[], _searchIdx=-1;

function toggleSearch() {
  const bar = document.getElementById("search-bar");
  if (bar.style.display==="none"||!bar.style.display) { bar.style.display="flex"; document.getElementById("search-input").focus(); }
  else closeSearch();
}
function closeSearch() {
  document.getElementById("search-bar").style.display="none";
  document.getElementById("search-input").value="";
  clearSearchHighlights(); _searchMatches=[]; _searchIdx=-1;
  document.getElementById("search-count").textContent="0/0";
}
function clearSearchHighlights() {
  document.querySelectorAll("#feed mark.sh").forEach(mark => {
    const p = mark.parentNode; p.replaceChild(document.createTextNode(mark.textContent),mark); p.normalize();
  });
}
function doSearch(query) {
  clearSearchHighlights(); _searchMatches=[]; _searchIdx=-1;
  if (!query||query.length<1) { document.getElementById("search-count").textContent="0/0"; return; }
  const feed = document.getElementById("feed");
  const walker = document.createTreeWalker(feed,NodeFilter.SHOW_TEXT,{
    acceptNode(node){ const p=node.parentElement; if(!p) return NodeFilter.FILTER_REJECT; if(p.closest(".msg-action-bar,.quote-preview")) return NodeFilter.FILTER_REJECT; return NodeFilter.FILTER_ACCEPT; }
  });
  const textNodes=[]; let n;
  while((n=walker.nextNode())) textNodes.push(n);
  const lq=query.toLowerCase();
  textNodes.forEach(node=>{
    const text=node.nodeValue, lower=text.toLowerCase();
    let idx=0, found=false;
    const frag=document.createDocumentFragment();
    while(true){
      const pos=lower.indexOf(lq,idx);
      if(pos===-1){frag.appendChild(document.createTextNode(text.slice(idx)));break;}
      if(pos>idx) frag.appendChild(document.createTextNode(text.slice(idx,pos)));
      const mark=document.createElement("mark"); mark.className="sh"; mark.textContent=text.slice(pos,pos+query.length);
      frag.appendChild(mark); _searchMatches.push(mark); found=true; idx=pos+query.length;
    }
    if(found) node.parentNode.replaceChild(frag,node);
  });
  document.getElementById("search-count").textContent=_searchMatches.length>0?"1/"+_searchMatches.length:"0/0";
  if(_searchMatches.length>0){_searchIdx=0;highlightSearchMatch(0);}
}
function highlightSearchMatch(idx){
  _searchMatches.forEach((m,i)=>m.classList.toggle("active-sh",i===idx));
  if(_searchMatches[idx]){_searchMatches[idx].scrollIntoView({behavior:"smooth",block:"center"}); document.getElementById("search-count").textContent=(idx+1)+"/"+_searchMatches.length;}
}
function searchNav(dir){
  if(!_searchMatches.length) return;
  _searchIdx=(_searchIdx+dir+_searchMatches.length)%_searchMatches.length;
  highlightSearchMatch(_searchIdx);
}

//  OPTIONS DRAWER
// ════════════════════════════════════════════════════════
let _optsData=[], _optsOrder=new Map(), _optsExpanded=new Set(); // _optsOrder: id→序号（1,2,3…）
// hint懒加载缓存：每次renderOptions时清空，按需生成走向分析
let _hintCache = {};

function toggleOptsDrawer() {
  const drawer = document.getElementById("opts-drawer");
  drawer.classList.toggle("collapsed");
  const hintEl = document.getElementById("opts-drawer-hint");
  if (hintEl) hintEl.style.display = drawer.classList.contains("collapsed") ? "" : "none";
}
function renderOptions(opts) {
  _optsData=opts||[];
  _optsOrder.clear();
  _optsExpanded.clear();
  _hintCache = {}; // 每轮新选项出来时清空hint缓存
  _renderOptsDrawer();
}

function _renderOptsDrawer(keepOpen=false) {
  const drawer=document.getElementById("opts-drawer"),body=document.getElementById("opts-drawer-body"),badge=document.getElementById("opts-badge"),footer=document.getElementById("opts-drawer-footer"),sendBtn=document.getElementById("opts-send-btn");
  if(!_optsData.length){drawer.classList.add("collapsed");body.innerHTML="";badge.textContent="0 项";badge.classList.remove("has-sel");footer.style.display="none";const h=document.getElementById("opts-drawer-hint");if(h)h.style.display="none";return;}
  // keepOpen=true 时（如勾选 checkbox 后重绘）保持当前展开/收起状态，不强制收起
  if(!keepOpen) drawer.classList.add("collapsed");
  badge.textContent=_optsData.length+" 项"; badge.classList.toggle("has-sel",_optsOrder.size>0); body.innerHTML="";
  const hintEl=document.getElementById("opts-drawer-hint");if(hintEl)hintEl.style.display="";
  _optsData.forEach(o=>{
    const orderNum=_optsOrder.get(o.id)||0, isSelected=orderNum>0, isExpanded=_optsExpanded.has(o.id);
    const typeClass=o.type==="special"?"special":o.type==="danger"?"danger":o.type==="iz"?"iz-type":"";
    const item=document.createElement("div"); item.className=`opt-item ${typeClass} ${isSelected?"selected":""}`;
    item.innerHTML=`<div class="opt-item-header"><span class="opt-item-num">${o.id}</span><span class="opt-item-text">${esc(o.text)}</span><div class="opt-item-actions"><button class="opt-expand-btn">${isExpanded?"收起▲":"详情▼"}</button><div class="opt-order-badge${isSelected?" active":""}" data-id="${o.id}">${isSelected?`<span style="font-size:17px;font-weight:700;line-height:1">${orderNum}</span>`:"+"}</div></div></div><div class="opt-item-detail ${isExpanded?"open":""}">
  <div class="opt-hint-wrap">
    <div class="opt-hint-label">▸ 可能的发展走向</div>
    ${(()=>{
      const hints=(o.hint||'').split('·').map(h=>h.trim()).filter(Boolean);
      const colors={normal:{bg:'rgba(74,158,255,0.08)',border:'rgba(74,158,255,0.2)',idx:'#4a9eff'},special:{bg:'rgba(232,184,64,0.08)',border:'rgba(232,184,64,0.25)',idx:'#e8b840'},danger:{bg:'rgba(255,74,74,0.08)',border:'rgba(255,74,74,0.2)',idx:'#ff7a7a'},iz:{bg:'rgba(155,107,255,0.08)',border:'rgba(155,107,255,0.2)',idx:'#b88aff'}};
      const c=colors[o.type]||colors.normal;
      if(!hints.length) return '<div class="opt-hint-empty">展开选项以查看走向分析…</div>';
      return '<div class="opt-hint-rows">'+hints.map((h,i)=>`<div class="opt-hint-row" style="background:${c.bg};border:1px solid ${c.border};animation-delay:${0.15+i*0.07}s"><span class="opt-hint-idx" style="color:${c.idx}">${String(i+1).padStart(2,'0')}</span><span class="opt-hint-text">${esc(h)}</span></div>`).join('')+'</div>';
    })()}
  </div>
</div>`;
    item.querySelector(".opt-item-text").addEventListener("click",(e)=>{
      e.stopPropagation();
      if(processing) return;
      processAction("[选项"+o.id+"] "+o.text);
    });
    item.querySelector(".opt-item-num").addEventListener("click",(e)=>{
      e.stopPropagation();
      if(processing) return;
      processAction("[选项"+o.id+"] "+o.text);
    });
    item.querySelector(".opt-expand-btn").addEventListener("click", async (e) => {
      e.stopPropagation();
      // 如果已经展开了，就收起来
      if (_optsExpanded.has(o.id)) {
        _optsExpanded.delete(o.id);
        _renderOptsDrawer(true); // keepOpen：展开/收起 detail 不影响抽屉状态
        return;
      }
      // 展开：先显示loading状态，再按需生成hint
      _optsExpanded.add(o.id);
      _renderOptsDrawer(true); // keepOpen：同上

      // 如果这个选项的hint已经生成过，直接显示缓存内容即可
      if (_hintCache[o.id]) {
        _injectHint(item, o, _hintCache[o.id]);
        return;
      }

      // 还没有hint，显示loading提示
      const hintWrap = item.querySelector(".opt-hint-wrap");
      if (hintWrap) hintWrap.innerHTML = `<div class="opt-hint-empty" style="color:var(--cold);animation:netSearchPulse 1.2s infinite">▸ 分析走向中…</div>`;

      try {
        const t = getActive();
        const p = t.player;

        // 设置8秒超时，超时后自动放弃，不让用户无限等待
        const timeoutSignal = AbortSignal.timeout ? AbortSignal.timeout(8000) : (() => {
          const ctrl = new AbortController();
          setTimeout(() => ctrl.abort(), 8000);
          return ctrl.signal;
        })();

        const res = await fetch(DS_API, {
          method:"POST",
          headers:{"Content-Type":"application/json","Authorization":"Bearer "+API_KEY},
          signal: timeoutSignal,
          body: JSON.stringify({
            model: DS_MODEL,
            max_tokens: 80,
            temperature: 0.7,
            messages: [{
              role: "user",
              content: `后室游戏。当前：${p.currentLevel} HP:${p.hp} 精神:${p.sanity} 位置:${p.location} 威胁:${p.threat||'无'}。
对选项"${o.text}"给出1-3条最可能的后续走向，每条不超过12字，只用「·」分隔输出，不要其他任何文字。`
            }]
          })
        });
        const data = await res.json();
        const hint = data.choices?.[0]?.message?.content?.trim() || "· 走向未知";
        _hintCache[o.id] = hint;
        _injectHint(item, o, hint);
      } catch(err) {
        const hintWrap2 = item.querySelector(".opt-hint-wrap");
        // 区分超时和其他错误，给用户不同的提示
        const msg = err.name === "AbortError" ? "（分析超时，可重新展开重试）" : "（分析失败，请重试）";
        if (hintWrap2) hintWrap2.innerHTML = `<div class="opt-hint-empty">${msg}</div>`;
      }
    });
    item.querySelector(".opt-order-badge").addEventListener("click",(e)=>{
      e.stopPropagation();
      if(_optsOrder.has(o.id)){
        // 取消：删除这个序号，把比它大的序号全部减1（保持连续）
        const removed=_optsOrder.get(o.id);
        _optsOrder.delete(o.id);
        for(const [k,v] of _optsOrder) if(v>removed) _optsOrder.set(k,v-1);
      } else {
        // 分配下一个序号
        _optsOrder.set(o.id, _optsOrder.size+1);
      }
      _renderOptsDrawer(true); // keepOpen：不收起抽屉
    });
    body.appendChild(item);
  });
  if(_optsOrder.size>0){footer.style.display="flex";sendBtn.textContent="▶ 按顺序执行 "+_optsOrder.size+" 个行动";badge.textContent=_optsData.length+" 项（已排 "+_optsOrder.size+"）";badge.classList.add("has-sel");}
  else footer.style.display="none";
}

// hint注入辅助函数：把生成好的hint文字渲染进选项的详情区域
function _injectHint(item, o, hintText) {
  const hintWrap = item.querySelector(".opt-hint-wrap");
  if (!hintWrap) return;
  const hints = hintText.split('·').map(h => h.trim()).filter(Boolean);
  const colorMap = { normal:'rgba(74,158,255,0.08)', special:'rgba(232,184,64,0.08)', danger:'rgba(255,74,74,0.08)', iz:'rgba(155,107,255,0.08)' };
  const idxColorMap = { normal:'#4a9eff', special:'#e8b840', danger:'#ff7a7a', iz:'#b88aff' };
  const bg  = colorMap[o.type]  || colorMap.normal;
  const ic  = idxColorMap[o.type] || idxColorMap.normal;
  const bdr = bg.replace('0.08','0.2');
  hintWrap.innerHTML = `
    <div class="opt-hint-label">▸ 走向分析</div>
    <div class="opt-hint-rows">${
      hints.map((h, i) => `
        <div class="opt-hint-row" style="background:${bg};border:1px solid ${bdr};animation-delay:${i*0.08}s">
          <span class="opt-hint-idx" style="color:${ic}">${String(i+1).padStart(2,'0')}</span>
          <span class="opt-hint-text">${esc(h)}</span>
        </div>`).join('')
    }</div>`;
}
function clearOptSelection(){_optsOrder.clear();_renderOptsDrawer(true);}
function sendSelectedOpts(){
  if(!_optsOrder.size) return;
  // 按序号排序，拼成"①行动A ②行动B"格式
  const sorted=[..._optsOrder.entries()].sort((a,b)=>a[1]-b[1]);
  const nums=["①","②","③","④","⑤","⑥","⑦","⑧","⑨","⑩"];
  const text=sorted.map(([id,idx])=>{
    const o=_optsData.find(x=>x.id===id);
    return o?(nums[idx-1]||idx+".")+o.text:"";
  }).filter(Boolean).join(" ");
  if(text) processAction("[顺序行动] "+text);
}

// 弹窗内确认名字后的入场逻辑，完全取代旧的 _doAskName + handleSend 中的名字分支
function _confirmNameAndEnter() {
  const nameInput = document.getElementById("wm-name-input");
  const warn = document.getElementById("wm-name-warn");
  const raw = nameInput ? nameInput.value.trim() : "";

  if (!raw) {
    // 没输名字就提示，不放行
    if (warn) warn.style.display = "block";
    if (nameInput) nameInput.style.borderColor = "var(--danger)";
    return;
  }

  // 关闭弹窗
  const overlay = document.getElementById("welcome-modal-overlay");
  if (overlay) overlay.remove();

  // 把名字写入旅程数据
  const t = getActive();
  const finalName = raw.length <= 12 ? raw : raw.substring(0, 12);
  t.player.name = finalName;
  t.charName = finalName;
  saveAll();
  updateStatusBar();

  // 直接交给 AI 伊兹做开场，不再有本地写死的打字机前置内容。
  // 首轮提示词明确约束：只生成 iz（接入问候）+ narrator（环境感知）两条消息，
  // 不生成 net（BackNet舆论帖子）——那些等玩家主动行动后自然出现，
  // 避免一上来就信息过载，同时完全消除"两个伊兹说话"的混乱现象。
  processAction(
    `[系统初始化] 角色名：「${finalName}」。执行神经接入开场序列。` +
    `messages 数组严格只包含两条：` +
    `①type:"iz"——伊兹的神经接入问候，语气温柔带电流质感，` +
    `提到已锁定${finalName}的神经信号，告知当前处于后室 Level 0，` +
    `简要说明不是一个人并请${finalName}先观察周围感知状态。字数控制在80字内。` +
    `②type:"narrator"——主角视角的第一人称感官描述，` +
    `潮湿黄色壁纸、荧光灯嗡鸣、脚踩地毯无声、走廊向前延伸看不到头，约30字。` +
    `【重要】本轮禁止生成 type:"net" 的 BackNet 帖子，那是玩家行动后才出现的内容。` +
    `给出6-8个初始行动选项，第一个必须是 type:"iz"、text:"【问伊兹】确认自身状态与层级情报"。`
  );
}

function showKeyGuide() { showWelcomeModal(); }

// ════════════════════════════════════════════════════════
//  BOTTOM SHEET — 背包/状态/层级/快捷行动 统一底部弹起
// ════════════════════════════════════════════════════════
function openBottomSheet(type) {
  closeBottomSheet(); // 关掉已有的

  const t   = getActive();
  const p   = t.player;
  let title = "";
  let extra = ""; // extra class on .bsheet
  let bodyHtml = "";

  if (type === "backpack") {
    title = "▣ 背包物品";
    if (!t.inventory.length) {
      bodyHtml = `<div style="color:var(--txt2);text-align:center;padding:40px 0;font-size:14px">背包是空的</div>`;
    } else {
      bodyHtml = t.inventory.map(i =>
        `<div class="item-card"><div class="item-n">${esc(i.name)}<span class="item-q">x${i.qty}</span></div><div class="item-d">${esc(i.desc)}</div></div>`
      ).join("");
    }

  } else if (type === "status") {
    title = "◈ 详细状态";
    let rows = "";
    [[`生命值 HP`,p.hp,p.hpMax,"hp"],[`精神值 SAN`,p.sanity,p.sanityMax,"san"],[`体力能量`,p.energy,p.energyMax,"en"]].forEach(([l,v,m,c]) => {
      rows += `<div class="srow"><div class="slbl">${l}<span>${v}/${m}</span></div><div class="sbg"><div class="sf ${c}" style="width:${Math.round(v/m*100)}%"></div></div></div>`;
    });
    let devSkills = p.devourSkills.map(sk =>
      `<div class="sk-card"><div class="sk-n">${esc(sk.name)}<span class="sk-lv">Lv.${sk.level}</span></div><div class="sk-d">${esc(sk.desc)}</div></div>`
    ).join("");
    let absorbed = p.devourAbsorbed.length
      ? `<div class="sec-t" style="margin-top:16px">◉ 已吞噬实体</div>` + p.devourAbsorbed.map(a=>`<div style="color:var(--txt2);font-size:13px;padding:4px 0;border-bottom:1px solid var(--bdr)">· ${esc(a)}</div>`).join("")
      : "";
    const isNoneMode = DEVOUR_PERSONA.trim() === "无";
    const devourSection = isNoneMode
      ? `<div class="sec-t" style="margin-top:16px">◈ 无</div>
         <div style="color:var(--txt2);font-size:13px;padding:10px;background:var(--bg2);border-radius:8px;border:1px solid var(--bdr);text-align:center">无<br><span style="font-size:12px;color:var(--txt3)">纯粹后室探险者，无任何异能</span></div>`
      : `<div class="sec-t" style="margin-top:16px">◈ ${getAbilitySystemName()}</div>
         <div class="srow"><div class="slbl">等级 Lv.${p.devourLevel}<span>${p.devourExp}/${p.devourExpMax} EXP</span></div><div class="sbg"><div class="sf dv" style="width:${Math.round(p.devourExp/p.devourExpMax*100)}%"></div></div></div>
         ${devSkills}${absorbed}`;
    let effects = p.statusEffects.length
      ? `<div class="sec-t" style="margin-top:16px;color:var(--danger)">⚠ 状态效果</div>` + p.statusEffects.map(e=>`<div style="color:var(--danger);font-size:13px;padding:4px 0">· ${esc(e)}</div>`).join("")
      : "";
    let threat = p.threat ? `<div class="threat-box"><b>⚠ 当前威胁：</b>${esc(p.threat)}</div>` : "";
    let summary = t.worldSummary
      ? `<div class="sec-t" style="margin-top:16px">📖 世界记忆摘要</div><div style="color:var(--txt2);font-size:13px;line-height:1.8;padding:10px;background:var(--bg2);border-radius:8px;border:1px solid var(--bdr)">${nl(t.worldSummary)}</div>`
      : "";
    bodyHtml = `
      <div class="sec-t">▣ 生命体征</div>${rows}
      ${devourSection}
      ${effects}${threat}${summary}`;

  } else if (type === "map") {
    title = "◉ 层级图鉴";
    const lvHtml = t.levelLog.length
      ? t.levelLog.map(l => {
          const dc = {low:"low",med:"med",high:"high",extreme:"extreme"}[l.dangerRating]||"med";
          const dl = {low:"低危",med:"中危",high:"高危",extreme:"极危"}[l.dangerRating]||"中危";
          return `<div class="lvlog-card">
            <div class="lvlog-code">${esc(l.code)}</div>
            <div class="lvlog-info">
              <div class="lvlog-name">${esc(l.name)}</div>
              <div class="lvlog-desc">${esc(l.desc)}</div>
              <div class="lvlog-danger ${dc}">危险等级：${dl}</div>
            </div></div>`;
        }).join("")
      : `<div style="color:var(--txt2);font-size:13px;padding:30px;text-align:center">尚未记录任何层级<br><span style="font-size:12px;color:var(--txt3)">探索新层级后自动更新</span></div>`;
    bodyHtml = `
      <div style="background:var(--bg2);border:1px solid var(--bdr2);border-radius:10px;padding:14px;margin-bottom:14px">
        <div class="sec-t">当前所在</div>
        <div style="color:var(--txt);font-size:17px;font-weight:600">${esc(p.currentLevel)}</div>
        <div style="color:var(--cold);font-family:'Share Tech Mono',monospace;font-size:13px;margin:4px 0">${esc(p.levelCode)}</div>
        <div style="color:var(--txt2);font-size:13px">📍 ${esc(p.location)}</div>
      </div>
      <div class="sec-t">已探索层级（${t.levelLog.length}处）</div>${lvHtml}`;

  } else if (type === "quickactions") {
    title = "⚡ 快捷行动";
    extra = "qa-style";
    const qas = [...(t.quickActions||[])].sort((a,b)=>(b.pinned?1:0)-(a.pinned?1:0)||(b.freq||0)-(a.freq||0));
    const qaRows = qas.length
      ? qas.map(q => `<div class="qa-item" id="qa-${q.id}">
          <div class="qa-text" onclick="sendQuickAction('${esc(q.text)}')">${esc(q.text)}</div>
          <span class="qa-freq">${q.freq||1}次</span>
          <span class="qa-pin" onclick="togglePinQAbs('${q.id}')">${q.pinned?'📌':'·'}</span>
          <button class="qa-del" onclick="deleteQAbs('${q.id}')">✕</button>
        </div>`).join("")
      : `<div style="color:var(--txt2);font-size:13px;padding:20px;text-align:center">常用指令会在这里自动推荐<br><span style="color:var(--txt3);font-size:12px">重复发送相同指令即可触发</span></div>`;
    bodyHtml = `
      <div class="qa-add-row">
        <input class="qa-add-input" id="qabs-add-input" type="text" placeholder="手动添加常用指令…" maxlength="100">
        <button class="qa-add-btn" onclick="addQAbs()">添加</button>
      </div>
      <div style="color:var(--txt3);font-size:12px;margin-bottom:10px;font-family:'Share Tech Mono',monospace">常用指令 · 点击直接发送</div>
      ${qaRows}`;
  } else {
    return; // unknown type, bail
  }

  const overlay = document.createElement("div");
  overlay.className = "bsheet-overlay";
  overlay.id = "bsheet-overlay";
  overlay.onclick = (e) => { if (e.target === overlay) closeBottomSheet(); };

  const sheet = document.createElement("div");
  sheet.className = `bsheet ${extra}`.trim();
  sheet.id = "bsheet-main";
  sheet.innerHTML = `
    <div class="bsheet-handle"></div>
    <div class="bsheet-header">
      <div class="bsheet-title">${title}</div>
      <button class="bsheet-close" onclick="closeBottomSheet()">✕</button>
    </div>
    <div class="bsheet-body">${bodyHtml}</div>`;

  document.body.appendChild(overlay);
  document.body.appendChild(sheet);

  // wire quickaction buttons in bottom sheet context
  if (type === "quickactions") {
    const inp = document.getElementById("qabs-add-input");
    if (inp) inp.addEventListener("keydown", e => { if (e.key === "Enter") addQAbs(); });
  }
}

function closeBottomSheet() {
  const overlay = document.getElementById("bsheet-overlay");
  const sheet   = document.getElementById("bsheet-main");
  if (!overlay && !sheet) return;
  // Animate out
  if (sheet) {
    sheet.style.transition = "transform 0.25s cubic-bezier(0.4,0,1,1)";
    sheet.style.transform  = "translateY(100%)";
  }
  if (overlay) {
    overlay.style.transition = "opacity 0.22s";
    overlay.style.opacity    = "0";
  }
  setTimeout(() => {
    overlay?.remove();
    sheet?.remove();
  }, 260);
}

// Bottom-sheet QA helpers (mirror the panel-version, refresh the sheet)
function togglePinQAbs(id) {
  const t = getActive();
  const q = (t.quickActions||[]).find(q => q.id === id);
  if (q) { q.pinned = !q.pinned; saveAll(); closeBottomSheet(); openBottomSheet('quickactions'); }
}
function deleteQAbs(id) {
  const t = getActive();
  t.quickActions = (t.quickActions||[]).filter(q => q.id !== id);
  saveAll(); closeBottomSheet(); openBottomSheet('quickactions');
}
function addQAbs() {
  const inp = document.getElementById("qabs-add-input");
  if (!inp) return;
  const text = inp.value.trim();
  if (!text) return;
  const t = getActive();
  t.quickActions = t.quickActions || [];
  if (!t.quickActions.find(q => q.text === text)) {
    t.quickActions.push({ id: Date.now().toString(), text, freq: 1, pinned: false });
    saveAll();
  }
  closeBottomSheet(); openBottomSheet('quickactions');
}

function openActionBar() { openBottomSheet('quickactions'); }
window.addEventListener("DOMContentLoaded", ()=>{

  // Init net icon
  const ni = document.getElementById("net-icon");
  if (ni) ni.innerHTML = netIconSVG(NET_ON);

  document.getElementById("cinput").addEventListener("keydown", e=>{
    if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();handleSend();}
  });

  const setupScreen = document.getElementById("setup-screen");
  if (setupScreen) {
    setupScreen.addEventListener("focusin",(e)=>{
      if(e.target.matches("input,textarea")) setTimeout(()=>e.target.scrollIntoView({behavior:"smooth",block:"center"}),350);
    });
    if(window.visualViewport){
      window.visualViewport.addEventListener("resize",()=>{
        const active=document.activeElement;
        if(active&&active.matches("input,textarea")&&setupScreen.contains(active)&&setupScreen.style.display!=="none")
          setTimeout(()=>active.scrollIntoView({behavior:"smooth",block:"center"}),80);
      });
    }
  }

  initSetupChips();

  const feed = document.getElementById("feed");
  if (feed) feed.addEventListener("scroll", updateScrollBtns, {passive:true});

  const si = document.getElementById("search-input");
  if (si) {
    si.addEventListener("input",()=>doSearch(si.value.trim()));
    si.addEventListener("keydown",e=>{
      if(e.key==="Enter") searchNav(e.shiftKey?-1:1);
      if(e.key==="Escape") closeSearch();
    });
  }

  if (_gameStartedByButton) return;

  // 用异步加载：优先 IndexedDB（解决 content:// 下 localStorage 存档丢失的问题），
  // 失败才回退 localStorage。
  document.getElementById("setup-screen").style.display = "none";
  const ls = document.getElementById("loading-screen");
  ls.style.display = "flex";

  // 先异步读存档，再继续启动流程
  loadAllAsync().then(hasSave => {
  initSetupChips();
  if (ni) ni.innerHTML = netIconSVG(NET_ON);

  const loadMsgs = [
    "正在初始化伊兹神经接入系统…",
    "加载后室层级数据库…",
    "校准暴食系统核心参数…",
    "构建 BackNet 信号矩阵…",
    "一切就绪，正在进入后室…",
  ];
  let ldI = 0;
  const lmsg = document.getElementById("ld-msg");
  const ldTimer = setInterval(()=>{
    ldI++;
    if(ldI < loadMsgs.length){ lmsg.textContent = loadMsgs[ldI]; }
    else {
      clearInterval(ldTimer);
      setTimeout(()=>{
        ls.style.display = "none";
        const gs = document.getElementById("game-screen");
        gs.style.display = "flex";
        updateStatusBar();

        if (hasSave && TOPICS.length) {
          // 修复黑屏bug：如果 ACTIVE_TOPIC_ID 无效，重置为第一个旅程
          let t = getActive();
          if (!t) {
            ACTIVE_TOPIC_ID = TOPICS[0].id;
            t = getActive();
          }
          // 如果仍为 null（极端情况），重建新旅程防止黑屏
          if (!t) {
            const fallback = newTopicState("探索者");
            TOPICS = [fallback];
            ACTIVE_TOPIC_ID = fallback.id;
            saveAll();
            updateStatusBar();
            if (!API_KEY) { showKeyGuide(); } else { showWelcomeModal(); }
            return;
          }
          (t.renderedMessages||[]).forEach(m=>{ const el=renderMsgObj(m); if(el) feed.appendChild(el); });
          feed.scrollTop = feed.scrollHeight;
          // 如果没有密钥，先弹密钥提示
          if (!API_KEY) {
            showKeyGuide();
          } else if (!t.convoHistory.length) {
            showWelcomeModal();
          } else {
            renderOptions([
              {id:1,text:"继续上次的行动",type:"normal"},
              {id:2,text:"【问伊兹】快速汇报当前状态与周边情况",type:"iz"},
              {id:3,text:"查看背包物资",type:"normal"},
              {id:4,text:"环顾四周，仔细观察当前环境",type:"normal"},
            ]);
          }
        } else {
          const firstTopic = newTopicState("探索者");
          TOPICS = [firstTopic];
          ACTIVE_TOPIC_ID = firstTopic.id;
          saveAll();
          updateStatusBar();
          if (!API_KEY) {
            showKeyGuide();
          } else {
            showWelcomeModal();
          }
        }
      }, 400);
    }
  }, 620);

  if (API_KEY) document.getElementById("ds-key-input").value = API_KEY;
  initSetupChips();

  }).catch(err => {
    // loadAllAsync 完全失败时的容错：直接进空白新游戏
    console.warn("[Load] loadAllAsync failed:", err);
    const ls2 = document.getElementById("loading-screen");
    if (ls2) ls2.style.display = "none";
    const gs2 = document.getElementById("game-screen");
    if (gs2) gs2.style.display = "flex";
    const ft = newTopicState("探索者");
    TOPICS = [ft]; ACTIVE_TOPIC_ID = ft.id;
    updateStatusBar();
    showWelcomeModal();
  });

  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("sw.js").then(reg=>{
      console.log("[PWA] SW registered, scope:", reg.scope);
    }).catch(err=>console.warn("[PWA] SW failed:", err));
  }
});

function _closeDrawer() {
  const el = _drawerEl();
  if (el) {
    el.classList.remove("open");
    el.style.opacity    = "";
    el.style.pointerEvents = "";
    el.style.width      = "";
    el.style.transition = "";
  }
}
